<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RSS媒体阅读器</title>
<script src="https://unpkg.com/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto;}
html {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  height: 100%;
}
body{
  background:#f5f5f5;color:#111;
  height: 100%;
  margin: 0;
}

/* 顶部悬浮固定栏 磨砂玻璃 */
#mainHeader{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 48px;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(26px);
    -webkit-backdrop-filter: blur(26px);
    z-index: 9999;
    display:flex;
    align-items:center;
    justify-content:center;
}

.title-wrap {
  position: relative;
  width: fit-content;
}
.beta-tag {
  position: absolute;
  top: -3px;
  right: -65px;
  font-size: 12px;
  background:#28a745;
  color:#fff;
  padding:2px 8px;
  border-radius:6px;
  z-index:9999;
  white-space:nowrap;
}
#pageTitle{
    font-size:19px;
    font-weight:600;
    white-space:nowrap;
}

/* 卡片样式 */
.tweet-card{
    background:#fff;
    border:none;
    border-radius:0;
    padding:14px;
    border-bottom:1px solid #dddddd;
    margin-bottom:0;
}

.img-grid-wrap{
    border-radius:10px;
    overflow:hidden;
    background:#f0f0f0;
    margin:6px 0;
}
.video-single-wrap{
    width:100%;
    position:relative;
    border-radius:10px;
    overflow:hidden;
    margin:6px 0;
    background:#000;
    height: auto;
}
.video-single-wrap:fullscreen{
    width:100vw;
    height:100vh;
    border-radius:0;
    display:flex;
    align-items:center;
    justify-content:center;
}
.video-single-wrap:-webkit-full-screen{
    width:100vw;
    height:100vh;
    border-radius:0;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* 底部悬浮导航栏 磨砂玻璃 */
.bottom-nav-bar{
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50px;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(26px);
    -webkit-backdrop-filter: blur(26px);
    z-index: 9999;
    display:flex;
    justify-content:space-around;
    overflow: hidden;
}
.bottom-nav-bar button{
    flex:1;
    height:100%;
    border:none;
    background:transparent;
    position: relative;
    /* 图标居中 */
    display:flex;
    align-items:center;
    justify-content:center;
}
/* 选中状态：图标变绿色 */
.bottom-nav-bar button.active svg{
    stroke:#28a745 !important;
}
/* 底部蓝色横线 */
.bottom-nav-bar button.active::after{
    content:"";
    position:absolute;
    left:15%;
    right:15%;
    bottom:0;
    height:4px;
    background:#0066dd;
    border-radius:4px;
}

.bottom-nav-bar::-webkit-scrollbar {
    display: none !important;
}

.main-wrap{
    padding-top: 48px;
    padding-bottom: 50px;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
}
.page-home,.page-manage,.page-add,.page-fav,.page-search{display:none;}
#pageHome,#pageManage,#pageFav,#pageSearch{
    width: 100%;
}
#pageAdd{
    width: 100%;
}

.feed-top-op{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    margin:12px 0;
}
#importFeed{background:#ff7823;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:14px;}
#exportAllBtn{background:#b388eb;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:14px;}
#delAllFeed{background:#c0392b;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:14px;}
.feed-list{background:#fff;}
.feed-item{
    padding:12px 10px;
    border-bottom:1px solid #ddd;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}
.feed-item:last-child{border-bottom:none;}

.feed-left-area{
    display:flex;
    align-items:center;
    gap:8px;
}
.feed-index{
    width:24px;
    text-align:center;
    font-size:14px;
    color:#666;
    flex-shrink:0;
}
.feed-name-btn{
    padding:4px 10px;
    border-radius:6px;
    font-size:14px;
    white-space:nowrap;
}
.btn-img{background:#34c759;color:#fff;}
.btn-video{background:#ff7597;color:#fff;}

.feed-btn-group{
    display:flex;
    gap:4px;
}
.feed-btn-group button{
    border:none;
    padding:4px 8px;
    border-radius:999px;
    font-size:12px;
    color:#fff;
}
.feed-btn-group .view-feed{background:#1d9bf0;}
.feed-btn-group .edit{background:#ff9500;}
.feed-btn-group .del{background:#e53e3e;}

.add-feed-row{display:flex;flex-wrap:wrap;gap:10px;margin:15px 12px;}
.add-feed-row input,.add-feed-row select{
    flex:1;
    min-width:140px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}
#confirmAdd{background:#1d9bf0;color:#fff;border:none;padding:0 16px;border-radius:8px;font-size:15px;min-width:100px;}
.add-feed-row-third select{flex:1;}
.add-feed-row-third #confirmAdd{flex:0 0 auto;flex-shrink:0;}
.add-feed-form{padding-bottom:10px;}
.keyword-block-section{
    border-top:2px solid #000;
    margin:20px 12px 0;
    padding-top:16px;
}
.keyword-block-title{
    font-size:16px;
    font-weight:600;
    margin:0 0 8px;
    color:#222;
}
.keyword-list{
    margin:8px 12px 16px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
.keyword-tag{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#f5f5f5;
    border:1px solid #ddd;
    border-radius:16px;
    padding:4px 6px 4px 12px;
    font-size:13px;
    color:#333;
}
.keyword-tag .kw-text{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.keyword-tag button{
    border:none;
    background:#e0e0e0;
    color:#555;
    width:22px;
    height:22px;
    border-radius:50%;
    font-size:14px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
}
.keyword-tag button:hover{background:#ccc;color:#222;}
.keyword-tag .kw-edit{background:#e8f4fd;color:#1d9bf0;}
.keyword-tag .kw-edit:hover{background:#d0e9fc;}
#addKeywordBtn{background:#1d9bf0;color:#fff;border:none;padding:0 16px;border-radius:8px;font-size:15px;min-width:70px;}

.empty-tip{text-align:center;padding:100px 10px;color:#777;font-size:16px;}
.error-tip{text-align:center;padding:30px 10px;color:#c0392b;font-size:15px;margin-bottom:10px;}
.update-tip-bar{
    background:#e6f7ff;
    border:1px solid #91caff;
    border-radius:0;
    padding:12px;
    text-align:center;
    color:#0050b3;
    margin-bottom:0;
    cursor:pointer;
    font-size:15px;
}
.no-update-tip{
    background:#f0f2f5;
    border:1px solid #dcdcdc;
    border-radius:0;
    padding:12px;
    text-align:center;
    color:#666;
    margin-bottom:0;
    font-size:15px;
}
.load-more-tip{
    text-align:center;padding:14px 0;color:#888;font-size:13px;
}

.card-top{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
}
.card-avatar{
    width:36px;
    height:36px;
    border-radius:50%;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.card-avatar svg{
    width:20px;
    height:20px;
    stroke:currentColor;
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
}
.source-name-text{
    font-size:16px;
    font-weight:600;
    color:#111;
}
.card-title-wrap{display:flex;gap:6px;align-items:flex-start;margin-bottom:6px;}
.card-title{
    flex:1;
    font-size:15px;
    font-weight:normal;
    color:#000;
    display:-webkit-box;
    -webkit-box-orient:vertical;
    -webkit-line-clamp:2;
    max-height:2.9em;
    overflow:hidden;
    line-height:1.45;
    word-break:break-all;
}
.card-title.expand{
    -webkit-line-clamp:999;
    max-height:none;
}
.title-toggle-btn{
    font-size:13px;
    color:#1d9bf0;
    border:none;
    background:transparent;
    white-space:nowrap;
    display:none;
}
.img-grid{display:grid;gap:2px;}
.grid-single{grid-template-columns:1fr;}
.grid-multi{grid-template-columns:1fr 1fr;}
.grid-img-box{position:relative;aspect-ratio:1/1;overflow:hidden;}
.grid-img{
    width:100%;height:100%;object-fit:cover;display:block;
}
.img-overlay-more{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
}
.media-video, .media-video-mp4{
    width: 100%;
    height: 100%;
    display: block;
    background:#000;
    object-fit: cover;
    cursor:pointer;
}
.media-video::-webkit-media-controls-start-playback-button,
.media-video-mp4::-webkit-media-controls-start-playback-button{
    display:none !important;
    -webkit-appearance:none;
}
.custom-media-controls{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:38px;
    padding:0 8px;
    display:flex;
    align-items:center;
    gap:8px;
    background:transparent;
    color:#fff;
    z-index:3;
}
.media-control-btn{
    width:30px;
    height:30px;
    border:none;
    background:transparent;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
}
.media-control-btn svg{
    width:20px;
    height:20px;
    stroke:currentColor;
    fill:none;
}
.media-control-btn .fill-icon{
    fill:currentColor;
    stroke:none;
}
.media-progress{
    flex:1;
    min-width:0;
    height:4px;
    appearance:none;
    -webkit-appearance:none;
    border-radius:999px;
    background:linear-gradient(to right,
        #28a745 0%,
        #28a745 var(--played, 0%),
        #40bfff var(--played, 0%),
        #40bfff var(--buffered, 0%),
        rgba(255,255,255,.35) var(--buffered, 0%),
        rgba(255,255,255,.35) 100%);
    outline:none;
}
.media-progress::-webkit-slider-runnable-track{
    height:4px;
    border-radius:999px;
    background:transparent;
}
.media-progress::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:12px;
    height:12px;
    margin-top:-4px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 0 4px rgba(0,0,0,.35);
}
.media-progress::-moz-range-track{
    height:4px;
    border-radius:999px;
    background:transparent;
}
.media-progress::-moz-range-thumb{
    width:12px;
    height:12px;
    border:none;
    border-radius:50%;
    background:#fff;
    box-shadow:0 0 4px rgba(0,0,0,.35);
}
.media-time{
    width:44px;
    text-align:right;
    font-size:12px;
    color:#fff;
    font-variant-numeric:tabular-nums;
    visibility:hidden;
}
.media-time.show{
    visibility:visible;
}
.media-video.is-playing + .custom-media-controls,
.media-video-mp4.is-playing + .custom-media-controls{
    opacity:.82;
}
.bottom-tip{text-align:center;padding:18px 0;color:#999;font-size:12px;}

.modal-mask{
    position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;
    align-items:center;justify-content:center;z-index:9999;padding:12px;
}
.modal-box{width:100%;max-width:480px;background:#fff;padding:16px;border-radius:12px;}
.modal-box input,.modal-box select{width:100%;margin-bottom:10px;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:15px;}
.modal-btn-bar{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;}
#cancelEdit{
    border:none;
    padding:8px 18px;
    border-radius:999px;
    font-size:15px;
    background:#6c757d;
    color:#fff;
}
#saveEdit{
    border:none;
    padding:8px 18px;
    border-radius:999px;
    font-size:15px;
    background:#28a745;
    color:#fff;
}

.img-preview-mask{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display:none;
    align-items:center;justify-content:center;
    z-index:9999;
    touch-action:none;
}
.preview-wrap{
    width:100%;height:100%;
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    scroll-snap-stop:always;
    scrollbar-width:none;
    -ms-overflow-style:none;
    -webkit-overflow-scrolling: touch;
}
.preview-wrap::-webkit-scrollbar{display:none;}
.preview-slide{
    flex:0 0 100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    scroll-snap-align:center;
    padding:10px;
}
.preview-img{max-width:92vw;max-height:92vh;object-fit:contain;}
.preview-close{
    position:absolute;
    bottom:30px;
    right:25px;
    color:#fff;
    font-size:28px;
    border:none;
    background:transparent;
    cursor:pointer;
    z-index:10;
}
.preview-tip{
    position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
    color:#fff;font-size:14px;background:rgba(0,0,0,0.4);padding:6px 14px;border-radius:16px;
}
.tip-toast{
    position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.65);color:#fff;padding:8px 16px;border-radius:20px;display:none;font-size:14px;
}
.card-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
    flex-wrap:wrap;
    gap:6px;
}
.card-bottom-left{font-size:12px;color:#666;}
.card-bottom-right{display:flex;gap:8px;}
.card-bottom-right button{
    border:none;
    background:#f2f3f5;
    color:#444;
    font-size:13px;
    border-radius:999px;
    width:30px;
    height:30px;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
}
.card-bottom-right button svg{width:16px;height:16px;stroke:currentColor;}
.btn-share{color:#555;}
.btn-fav{color:#555;}
.btn-fav.collected{color:#ff9500;background:#fff4e5;}
.fav-card-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
}
.update-float-bar{
    position:fixed;
    top:56px;
    left:50%;
    transform:translateX(-50%);
    z-index:10000;
    max-width:calc(100% - 24px);
    background:rgba(64, 190, 255, .45);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.45);
    color:#fff;
    padding:9px 16px;
    border-radius:999px;
    font-size:14px;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    cursor:pointer;
}
</style>

</head>
<body>
<header id="mainHeader">
<div class="title-wrap">
  <h1 id="pageTitle">RSS媒体阅读器</h1>
  <span class="beta-tag">Beta4.0</span>
</div>
</header>

<div class="main-wrap">
    <div class="page-home" id="pageHome">
        <div id="articleBox"></div>
    </div>
    <div class="page-manage" id="pageManage">
        <div class="feed-top-op">
    <button id="importFeed">一键导入</button>
    <button id="exportAllBtn">一键导出</button>
    <button id="delAllFeed">一键清空</button>
    <input type="file" id="importFileInput" accept=".json" style="position:absolute;opacity:0;width:1px;height:1px;pointer-events:none;">
</div>
        <div class="feed-list" id="feedPanel"></div>
    </div>
    <div class="page-add" id="pageAdd">
        <div class="add-feed-form">
            <div class="add-feed-row">
                <input id="feedUrl" placeholder="粘贴标准RSS订阅链接">
            </div>
            <div class="add-feed-row">
                <input id="feedName" placeholder="自定义订阅名称（可选）">
            </div>
            <div class="add-feed-row add-feed-row-third">
                <select id="feedCat">
                    <option value="img">图片类RSS</option>
                    <option value="video">视频类RSS</option>
                </select>
                <button id="confirmAdd">确认添加</button>
            </div>
        </div>
        <div class="keyword-block-section">
            <div class="keyword-block-title">关键字屏蔽</div>
            <div class="add-feed-row">
                <input id="blockKeywordInput" placeholder="输入要屏蔽的关键字">
                <button id="addKeywordBtn">添加</button>
            </div>
            <div class="keyword-list" id="keywordList"></div>
        </div>
    </div>
    <div class="page-fav" id="pageFav"><div id="favPanel"></div></div>
    <div class="page-search" id="pageSearch">
        <div style="padding:12px;">
            <input id="searchInput" placeholder="输入关键词精确匹配标题" style="width:100%;padding:12px;border-radius:8px;border:1px solid #ddd;font-size:16px;">
            <div id="searchResultBox"></div>
        </div>
    </div>
</div>

<div class="bottom-nav-bar">
    <button id="btnHome">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </button>
    <button id="btnSearch">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
        </svg>
    </button>
    <button id="btnAdd">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"></path>
        </svg>
    </button>
    <button id="btnManage">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" x2="21" y1="6" y2="6"></line>
            <line x1="8" x2="21" y1="12" y2="12"></line>
            <line x1="8" x2="21" y1="18" y2="18"></line>
            <line x1="3" x2="3.01" y1="6" y2="6"></line>
            <line x1="3" x2="3.01" y1="12" y2="12"></line>
            <line x1="3" x2="3.01" y1="18" y2="18"></line>
        </svg>
    </button>
    <button id="btnFav">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
        </svg>
    </button>
</div>

<div class="modal-mask" id="editModal">
    <div class="modal-box">
        <h3>编辑订阅源</h3>
        <input id="editIndex" type="hidden">
        <input id="editName" placeholder="自定义订阅名称">
        <select id="editCat">
            <option value="img">图片类RSS</option>
            <option value="video">视频类RSS</option>
        </select>
        <input id="editUrl" placeholder="RSS订阅链接">
        <div class="modal-btn-bar">
            <button id="cancelEdit">取消</button>
            <button id="saveEdit">保存修改</button>
        </div>
    </div>
</div>

<div class="img-preview-mask" id="imgPreviewMask">
    <button class="preview-close" id="previewClose">×</button>
    <div class="preview-wrap" id="previewWrap"></div>
    <div class="preview-tip" id="previewTip"></div>
</div>
<div class="tip-toast" id="slideTip"></div>

<script>
// 全局代理配置：RSS 拉取和媒体资源分开，避免两套逻辑互相影响。
// 如果你在 Cloudflare 上的路由不是 /rss-proxy 和 /media-proxy，只需要改这里。
const RSS_PROXY_ENDPOINTS = [
    "https://rss-twitter-viewer.pages.dev/rss-proxy",
    "https://rss-twitter-viewer.pages.dev/proxy"
];
const MEDIA_PROXY_ENDPOINT = "https://rss-twitter-viewer.pages.dev/media-proxy";

// 这些域名的 RSS 或媒体资源默认走代理。需要新增国外或特殊域名时，加到这里即可。
const FORCE_PROXY_HOSTS = [
    "twitter.com",
    "x.com",
    "t.co",
    "twimg.com",
    "video.twimg.com",
    "pbs.twimg.com",
    "abs.twimg.com",
    "xcancel.com",
    "nitter.net",
    "video.shturl."
];

function normalizeUrl(rawUrl) {
    return String(rawUrl || "").trim();
}

function cleanMediaUrl(rawUrl) {
    let url = fullDecodeXml(String(rawUrl || ""))
        .trim()
        .replace(/^<!\[CDATA\[/, "")
        .replace(/\]\]>$/, "")
        .replace(/^["'“”‘’]+|["'“”‘’，。,;；)）\]>]+$/g, "");
    url = url.replace(/\s+/g, " ");
    url = url.replace(/ /g, "%20");
    return url;
}

function getUrlCandidates(text, ext) {
    const source = fullDecodeXml(String(text || ""));
    const escapedExt = ext.replace(".", "\\.");
    const reg = new RegExp(`https?:\\/\\/[\\s\\S]{0,1200}?${escapedExt}(?:\\?[^<>"']*)?`, "gi");
    const list = [];
    let m;
    while((m = reg.exec(source)) !== null){
        let url = m[0];
        const httpIndex = url.lastIndexOf("http");
        if(httpIndex > 0) url = url.slice(httpIndex);
        url = url.replace(/<[^>]*$/g, "");
        url = url.replace(/\\s+(?=[a-zA-Z]+=|class=|style=|poster=|src=|href=|data-)/g, "");
        list.push(cleanMediaUrl(url));
    }
    return list.filter(Boolean);
}

function getUrlHost(rawUrl) {
    try {
        return new URL(normalizeUrl(rawUrl)).hostname.toLowerCase();
    } catch (e) {
        return "";
    }
}

function hostMatched(rawUrl, hostList = FORCE_PROXY_HOSTS) {
    const url = normalizeUrl(rawUrl).toLowerCase();
    const host = getUrlHost(url);
    return hostList.some(rule => {
        const key = String(rule).toLowerCase();
        return host === key || host.endsWith("." + key) || url.includes(key);
    });
}

function isHttpUrl(rawUrl) {
    return /^https?:\/\//i.test(normalizeUrl(rawUrl));
}

function buildProxyUrl(endpoint, rawUrl, extraParams = {}) {
    const u = new URL(endpoint);
    u.searchParams.set("url", normalizeUrl(rawUrl));
    Object.keys(extraParams).forEach(key => {
        if (extraParams[key] !== undefined && extraParams[key] !== null) {
            u.searchParams.set(key, extraParams[key]);
        }
    });
    return u.toString();
}

function getRSSProxyCandidates(rssUrl) {
    return RSS_PROXY_ENDPOINTS.map(endpoint => buildProxyUrl(endpoint, rssUrl));
}

function getProxyUrl(rawUrl, isFav = false) {
    const url = cleanMediaUrl(rawUrl);
    if (!isHttpUrl(url)) return url;

    // 国内普通图片、MP4、M3U8 不动；推特/X 等指定域名才交给 media-proxy。
    if (!hostMatched(url)) return url;

    const params = { raw: "1" };
    if (isFav) params.cache = "long";
    return buildProxyUrl(MEDIA_PROXY_ENDPOINT, url, params);
}

function getForceMediaProxyUrl(rawUrl, isFav = false) {
    const url = cleanMediaUrl(rawUrl);
    if (!isHttpUrl(url)) return url;
    const params = { raw: "1" };
    if (isFav) params.cache = "long";
    return buildProxyUrl(MEDIA_PROXY_ENDPOINT, url, params);
}

function escapeHtml(str) {
    if (!str) return "";
    return String(str).replace(/&/g,"&amp;")
               .replace(/</g,"&lt;")
               .replace(/>/g,"&gt;")
               .replace(/"/g,"&quot;")
               .replace(/'/g,"&#039;");
}

function escapeAttr(str) {
    return escapeHtml(str);
}

function fullDecodeXml(str){
    if(!str) return str;
    return str.replace(/&amp;/g,"&")
    .replace(/&lt;/g,"<")
    .replace(/&gt;/g,">")
    .replace(/&quot;/g,"\"")
    .replace(/&#039;/g,"'");
}

async function fetchTextWithTimeout(fetchUrl) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
    try {
        const res = await fetch(fetchUrl, { signal: controller.signal, cache: "no-store" });
        clearTimeout(timer);
        if (!res.ok) throw new Error(`请求失败(${res.status})`);
        let text = await res.text();
        return fullDecodeXml(text);
    } catch (err) {
        clearTimeout(timer);
        throw err;
    }
}

async function fetchRSSFeed(rssUrl) {
    const url = normalizeUrl(rssUrl);
    if (!isHttpUrl(url)) throw new Error("RSS 链接格式不正确");

    const proxyCandidates = getRSSProxyCandidates(url);
    const candidates = hostMatched(url)
        ? [...proxyCandidates, url]
        : [url, ...proxyCandidates];

    let lastErr = null;
    for (const candidate of candidates) {
        try {
            return await fetchTextWithTimeout(candidate);
        } catch (err) {
            lastErr = err;
            console.warn("RSS 拉取失败，尝试下一个地址：", candidate, err.message);
        }
    }
    throw lastErr || new Error("RSS 拉取失败");
}

function exportJsonFile(jsonData, fileName = "rss订阅备份.json") {
    try {
        const jsonStr = JSON.stringify(jsonData, null, 2);
        const blob = new Blob([jsonStr], { type: "application/json;charset=utf-8" });
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(blobUrl);
    } catch (e) {
        const jsonStr = JSON.stringify(jsonData, null, 2);
        const base64 = btoa(unescape(encodeURIComponent(jsonStr)));
        const dataUrl = `data:application/json;base64,${base64}`;
        const a2 = document.createElement("a");
        a2.href = dataUrl;
        a2.download = fileName;
        document.body.appendChild(a2);
        a2.click();
        a2.remove();
    }
}

function markReadByScroll(){
    if(lastPageTitle !== "RSS媒体阅读器") return;
    const lineY = mainWrap.getBoundingClientRect().top + 56;
    let changed = false;
    articleBox.querySelectorAll(".tweet-card").forEach(card=>{
        const link = card.dataset.link;
        if(!link || readLinkSet.has(link)) return;
        if(card.getBoundingClientRect().bottom < lineY){
            readLinkSet.add(link);
            changed = true;
        }
    });
    if(changed) saveReadLinks();
}

}

function hasBlockedKeyword(title){
    if(!blockKeywordList || blockKeywordList.length === 0) return false;
    const titleLower = (title || "").toLowerCase();
    return blockKeywordList.some(kw => kw && titleLower.includes(kw.toLowerCase()));
}

function getVisibleHomeArticles(list){
    if(filterSourceUrl) return list.filter(item => !hasBlockedKeyword(getPureText(item.title)));
    return list.filter(item => !sessionStartReadSet.has(item.link) && !hasBlockedKeyword(getPureText(item.title)));
}

function hashText(str){
    let hash = 0;
    const text = String(str || "");
    for(let i = 0; i < text.length; i++){
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
    }
    return Math.abs(hash);
}

function initVideoObserver(){
    if(videoObserver) return;
    videoObserver = new IntersectionObserver((entries)=>{
        entries.forEach(item=>{
            const video = item.target;
            if(!item.isIntersecting){
                video.pause();
                if(video.hlsInstance){
                    video.hlsInstance.stopLoad();
                }
            }
        })
    }, {threshold:0.01});
}

function pauseOtherVideos(currentVideo){
    document.querySelectorAll(".media-video, .media-video-mp4").forEach(v=>{
        if(v !== currentVideo && !v.paused){
            v.pause();
            if(v.hlsInstance) v.hlsInstance.stopLoad();
        }
    });
}

function toggleVideoPlay(video){
    if(video.classList.contains("media-video") && !video.dataset.hlsLoaded){
        startHlsVideo(video);
        return;
    }
    if(video.paused){
        pauseOtherVideos(video);
        video.play().catch(err => {
            console.warn("视频播放失败：", err);
            showToast("视频播放失败");
        });
    }else{
        video.pause();
        if(video.hlsInstance) video.hlsInstance.stopLoad();
    }
}

function formatMediaTime(seconds){
    if(!Number.isFinite(seconds) || seconds < 0) return "00:00";
    const total = Math.ceil(seconds);
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    const mm = String(m).padStart(2, "0");
    const ss = String(s).padStart(2, "0");
    if(h > 0) return `${String(h).padStart(2, "0")}:${mm}:${ss}`;
    return `${mm}:${ss}`;
}

function getBufferedPercent(video){
    if(!Number.isFinite(video.duration) || video.duration <= 0 || !video.buffered || video.buffered.length === 0){
        return 0;
    }
    let end = 0;
    for(let i = 0; i < video.buffered.length; i++){
        if(video.currentTime >= video.buffered.start(i) && video.currentTime <= video.buffered.end(i)){
            end = video.buffered.end(i);
            break;
        }
        end = Math.max(end, video.buffered.end(i));
    }
    return Math.min(100, Math.max(0, (end / video.duration) * 100));
}

function updateMediaControls(video){
    const wrap = video.closest(".video-single-wrap");
    if(!wrap) return;
    const playBtn = wrap.querySelector(".media-play-btn");
    const muteBtn = wrap.querySelector(".media-mute-btn");
    const progress = wrap.querySelector(".media-progress");
    const timeText = wrap.querySelector(".media-time");
    if(playBtn){
        playBtn.innerHTML = video.paused ? playIconSvg() : pauseIconSvg();
        playBtn.setAttribute("aria-label", video.paused ? "播放" : "暂停");
    }
    if(muteBtn){
        const muted = video.muted || video.volume === 0;
        muteBtn.innerHTML = muted ? muteIconSvg() : volumeIconSvg();
        muteBtn.setAttribute("aria-label", muted ? "取消静音" : "静音");
    }
    if(progress){
        const canSeek = Number.isFinite(video.duration) && video.duration > 0;
        progress.disabled = !canSeek;
        let playedPercent = 0;
        let bufferedPercent = 0;
        if(canSeek){
            playedPercent = Math.min(100, Math.max(0, (video.currentTime / video.duration) * 100));
            bufferedPercent = Math.max(playedPercent, getBufferedPercent(video));
        }
        progress.style.setProperty("--played", `${playedPercent}%`);
        progress.style.setProperty("--buffered", `${bufferedPercent}%`);
        if(canSeek && !progress.dataset.dragging){
            progress.value = Math.round((video.currentTime / video.duration) * 1000) || 0;
        }
    }
    if(timeText){
        const canShowTime = !video.paused && Number.isFinite(video.duration) && video.duration > 0;
        if(canShowTime){
            const remain = Math.max(video.duration - video.currentTime, 0);
            timeText.textContent = formatMediaTime(remain);
            timeText.classList.add("show");
        }else{
            timeText.textContent = "00:00";
            timeText.classList.remove("show");
        }
    }
    video.classList.toggle("is-playing", !video.paused);
}

function isMediaFullscreen(wrap, video){
    const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if(fsEl === wrap || fsEl === video) return true;
    // iOS native video fullscreen
    if(video.webkitDisplayingFullscreen) return true;
    return false;
}

function exitMediaFullscreen(wrap, video){
    if(document.exitFullscreen) {
        document.exitFullscreen().catch(()=>{});
    } else if(document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
    } else if(video.webkitExitFullscreen) {
        video.webkitExitFullscreen();
    }
}

function requestMediaFullscreen(wrap, video){
    const target = wrap || video;
    if(isMediaFullscreen(wrap, video)){
        exitMediaFullscreen(wrap, video);
        return;
    }
    if(target.requestFullscreen) {
        target.requestFullscreen().catch(()=>{});
    } else if(target.webkitRequestFullscreen) {
        target.webkitRequestFullscreen();
    } else if(video.webkitEnterFullscreen) {
        video.webkitEnterFullscreen();
    } else {
        showToast("当前浏览器不支持全屏");
    }
}

function bindCustomMediaControls(video){
    const wrap = video.closest(".video-single-wrap");
    if(!wrap || video.dataset.controlBind) return;
    video.dataset.controlBind = "1";
    const controls = wrap.querySelector(".custom-media-controls");
    if(!controls) return;
    const playBtn = controls.querySelector(".media-play-btn");
    const progress = controls.querySelector(".media-progress");
    const muteBtn = controls.querySelector(".media-mute-btn");
    const fullscreenBtn = controls.querySelector(".media-fullscreen-btn");

    controls.addEventListener("click", e => e.stopPropagation());
    if(playBtn){
        playBtn.onclick = e => {
            e.preventDefault();
            e.stopPropagation();
            toggleVideoPlay(video);
        };
    }
    if(muteBtn){
        muteBtn.onclick = e => {
            e.preventDefault();
            e.stopPropagation();
            video.muted = !video.muted;
            updateMediaControls(video);
        };
    }
    if(fullscreenBtn){
        fullscreenBtn.onclick = e => {
            e.preventDefault();
            e.stopPropagation();
            requestMediaFullscreen(wrap, video);
        };
    }
    // 监听全屏状态变化，更新按钮图标
    ["fullscreenchange","webkitfullscreenchange"].forEach(evt=>{
        document.addEventListener(evt, ()=>updateFullscreenBtnIcon(video));
    });
    if(video.webkitSupportsFullscreen){
        video.addEventListener("webkitbeginfullscreen", ()=>updateFullscreenBtnIcon(video));
        video.addEventListener("webkitendfullscreen", ()=>updateFullscreenBtnIcon(video));
    }
    if(progress){
        progress.addEventListener("pointerdown", e => {
            e.stopPropagation();
            progress.dataset.dragging = "1";
        });
        progress.addEventListener("input", e => {
            e.stopPropagation();
            if(Number.isFinite(video.duration) && video.duration > 0){
                video.currentTime = (Number(progress.value) / 1000) * video.duration;
            }
        });
        progress.addEventListener("pointerup", e => {
            e.stopPropagation();
            delete progress.dataset.dragging;
            updateMediaControls(video);
        });
    }

    ["play","pause","timeupdate","progress","durationchange","loadedmetadata","volumechange","ended"].forEach(evt=>{
        video.addEventListener(evt, ()=>updateMediaControls(video));
    });
    updateMediaControls(video);
}

function startHlsVideo(video){
    const sources = [video.dataset.src, video.dataset.altSrc].filter(Boolean);
    const uniqueSources = [...new Set(sources)];
    let sourceIndex = Number(video.dataset.hlsAttempt || 0);
    const streamUrl = uniqueSources[sourceIndex] || uniqueSources[0];
    if(!streamUrl) return;

    pauseOtherVideos(video);

    const playNow = (retry = true) => {
        video.play().catch(err => {
            console.warn("m3u8播放失败：", err);
            if(retry && err && err.name !== "NotAllowedError"){
                const retryPlay = ()=>{
                    video.removeEventListener("canplay", retryPlay);
                    video.removeEventListener("loadeddata", retryPlay);
                    playNow(false);
                };
                video.addEventListener("canplay", retryPlay, {once:true});
                video.addEventListener("loadeddata", retryPlay, {once:true});
                setTimeout(()=>playNow(false), 450);
            }else{
                showToast(err && err.name === "NotAllowedError" ? "请再点一次播放" : "视频播放失败");
            }
        });
    };

    if (video.dataset.hlsLoaded) {
        if(video.hlsInstance) video.hlsInstance.startLoad();
        playNow();
        return;
    }

    if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = streamUrl;
        video.dataset.hlsLoaded = "1";
        playNow();
    } else if (window.Hls && Hls.isSupported()) {
        if(video.hlsInstance){
            try{ video.hlsInstance.destroy(); }catch(e){}
            video.hlsInstance = null;
        }
        const hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            maxBufferLength: 30,
            capLevelToPlayerSize: true,
            storage: null,
            autoStartLoad: false
        });
        video.hlsInstance = hls;
        hls.attachMedia(video);
        hls.on(Hls.Events.MEDIA_ATTACHED, () => {
            hls.loadSource(streamUrl);
        });
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            hls.startLoad();
            video.dataset.hlsLoaded = "1";
            playNow();
        });
        hls.on(Hls.Events.ERROR, (event, data) => {
            if(data && data.fatal){
                console.warn("HLS致命错误：", data);
                const nextIndex = sourceIndex + 1;
                if(nextIndex < uniqueSources.length){
                    video.dataset.hlsAttempt = String(nextIndex);
                    delete video.dataset.hlsLoaded;
                    try{ hls.destroy(); }catch(e){}
                    video.hlsInstance = null;
                    startHlsVideo(video);
                }else{
                    showToast("m3u8加载失败");
                }
            }
        });
    } else {
        showToast("当前浏览器不支持m3u8播放");
    }
}

function preheatProxyVideo(video){
    if(!video || video.dataset.preheated || video.dataset.hlsLoaded) return;
    if(video.dataset.proxyVideo !== "1") return;
    video.dataset.preheated = "1";
    if(video.classList.contains("media-video-mp4")){
        video.preload = "metadata";
        video.load();
        return;
    }
}

function initProxyVideoPreheat(){
    if(!mediaPreheatObserver){
        mediaPreheatObserver = new IntersectionObserver(entries=>{
            entries.forEach(entry=>{
                if(entry.isIntersecting){
                    preheatProxyVideo(entry.target);
                    mediaPreheatObserver.unobserve(entry.target);
                }
            });
        }, {rootMargin:"420px 0px", threshold:0.01});
    }
    document.querySelectorAll(".media-video-mp4[data-proxy-video='1']").forEach(video=>{
        if(video.dataset.preheatObserve) return;
        video.dataset.preheatObserve = "1";
        mediaPreheatObserver.observe(video);
    });
}

function initHlsVideo(){
    document.querySelectorAll(".media-video[data-m3u8], .media-video-mp4").forEach(video=>{
        if (video.dataset.playerBind) return;
        video.dataset.playerBind = "1";
        const wrap = video.closest(".video-single-wrap") || video;
        if(!wrap.dataset.mediaClickBind){
            wrap.dataset.mediaClickBind = "1";
            wrap.addEventListener("click", (e)=>{
                e.preventDefault();
                e.stopPropagation();
                toggleVideoPlay(video);
            });
        }
        // 海报图加载失败回退：代理图失败时尝试直连
        if(video.poster && video.dataset.posterDirect && !video.dataset.posterFallback){
            video.dataset.posterFallback = "1";
            const posterImg = new Image();
            posterImg.onerror = function(){
                if(video.dataset.posterDirect && video.poster !== video.dataset.posterDirect){
                    video.poster = video.dataset.posterDirect;
                }
            };
            posterImg.src = video.poster;
        }
        if(video.classList.contains("media-video")){
            video.addEventListener("play", ()=>{
            if(!video.dataset.hlsLoaded) {
                video.pause();
                startHlsVideo(video);
            } else if(video.hlsInstance) {
                video.hlsInstance.startLoad();
            }
        });
        }
        bindCustomMediaControls(video);
    });
    initProxyVideoPreheat();
}

function bindVideoPauseObserver(){
    if(!videoObserver) initVideoObserver();

    // 清除旧绑定，防止重复监听
    document.querySelectorAll(".media-video, .media-video-mp4").forEach(v=>{
        videoObserver.unobserve(v);
        delete v.dataset.observeBind;
    });

    // 监听M3U8视频
    document.querySelectorAll(".media-video").forEach(v=>{
        if(!v.dataset.observeBind){
            videoObserver.observe(v);
            v.dataset.observeBind = "1";
        }
    });

    // 额外监听MP4视频，滑出屏幕自动暂停
    document.querySelectorAll(".media-video-mp4").forEach(v=>{
        if(!v.dataset.observeBind){
            videoObserver.observe(v);
            v.dataset.observeBind = "1";
        }
    });
}

function showPage(targetDom, titleText) {
    if (lastPageTitle === titleText) {
        return;
    }
    const willRestoreHome = titleText === "RSS媒体阅读器" && homeIsCached && homeCachedFilterSourceUrl === filterSourceUrl;

    if (lastPageTitle === "RSS媒体阅读器") {
        markReadByScroll();
        homeScrollTop = mainWrap.scrollTop;
        homeArticleHtml = articleBox.innerHTML;
        homeIsCached = true;
        homeCachedFilterSourceUrl = filterSourceUrl;
    }

    pageHome.style.display = "none";
    pageManage.style.display = "none";
    pageAdd.style.display = "none";
    pageFav.style.display = "none";
    pageSearch.style.display = "none";

    feedPanel.innerHTML = "";
    favPanel.innerHTML = "";
    if (targetDom === pageHome && !willRestoreHome) {
        articleBox.innerHTML = "";
    }

    if (willRestoreHome && !articleBox.innerHTML) {
        articleBox.innerHTML = homeArticleHtml;
    }
    targetDom.style.display = "block";
    targetDom.scrollTop = 0;

    const textNode = Array.from(pageTitle.childNodes).find(n => n.nodeType === 3);
    if (textNode) {
        textNode.textContent = titleText;
    }

    allBtns.forEach(b => b.classList.remove("active"));
    if (titleText === "RSS媒体阅读器") btnHome.classList.add("active");
    if (titleText === "管理订阅") btnManage.classList.add("active");
    if (titleText === "添加订阅") btnAdd.classList.add("active");
    if (titleText === "我的收藏") btnFav.classList.add("active");
    if (titleText === "内容搜索") btnSearch.classList.add("active");

    if (willRestoreHome) {
        const restoreHomeScroll = ()=>{
            mainWrap.scrollTop = homeScrollTop;
            requestAnimationFrame(()=>{ mainWrap.scrollTop = homeScrollTop; });
        };
        setTimeout(restoreHomeScroll, 0);
        setTimeout(restoreHomeScroll, 80);
        setTimeout(restoreHomeScroll, 250);
        bindAllCardEvent();
        bindVideoPauseObserver();
        initHlsVideo();
        lastPageTitle = titleText;
        return;
    }

    if (titleText === "RSS媒体阅读器") {
        renderHomeFromCache();
        homeIsCached = false;
    } else if (titleText === "管理订阅") {
        renderManage();
    } else if (titleText === "我的收藏") {
        renderFav();
    } else if (titleText === "内容搜索") {
        searchInput.value = "";
        searchResultBox.innerHTML = "";
    }

    lastPageTitle = titleText;
}

async function refreshAllRSSWithLock(){
    if(rssRefreshPromise) return rssRefreshPromise;
    rssRefreshPromise = (async ()=>{
        const data = await loadAllRSS();
        const cacheData = data.slice(0, ARTICLE_CACHE_LIMIT);
        allArticles = cacheData;
        localCacheArticles = [...cacheData];
        saveArticleCacheToStorage(cacheData);
        lastRefreshTime = Date.now();
        localStorage.setItem(LAST_REFRESH_KEY, String(lastRefreshTime));
        return cacheData;
    })();
    try{
        return await rssRefreshPromise;
    }finally{
        rssRefreshPromise = null;
    }
}

async function checkAndPromptUpdate(isManual = false){
    if(feedList.length === 0) return;
    if(rssRefreshPromise){
        showUpdateFloat("正在检查更新，请稍候");
        return;
    }
    const now = Date.now();
    const minInterval = isManual ? MANUAL_REFRESH_INTERVAL : AUTO_REFRESH_INTERVAL;
    if(lastRefreshTime && now - lastRefreshTime < minInterval){
        if(isManual) showUpdateFloat("刚刚检查过，稍后再试");
        return;
    }
    const oldLinkSet = new Set(localCacheArticles.map(i=>i.link));
    let newAll = [];
    try{
        newAll = await refreshAllRSSWithLock();
    }catch(err){
        console.warn("检查更新失败：", err);
        if(isManual) showUpdateFloat("检查更新失败，请稍后重试");
        return;
    }
    const visibleNewList = newAll.filter(item => !oldLinkSet.has(item.link) && !sessionStartReadSet.has(item.link));
    const newCount = visibleNewList.length;
    if(newCount > 0){
        showUpdateFloat(`更新${newCount}条内容，点击查看`, ()=>{
            filterSourceUrl = "";
            homeIsCached = false;
            homeArticleHtml = "";
            renderedArticleCount = 0;
            allArticles = [...newAll];
            localCacheArticles = [...newAll];
            saveArticleCacheToStorage(newAll);
            renderHomeFromCache();
            const scrollTopNow = ()=>{
                mainWrap.scrollTop = 0;
                requestAnimationFrame(()=>{ mainWrap.scrollTop = 0; });
            };
            scrollTopNow();
            setTimeout(scrollTopNow, 80);
            setTimeout(scrollTopNow, 250);
            const bar = document.getElementById("updateFloatBar");
            if(bar) bar.remove();
        });
    }else if(isManual){
        showUpdateFloat("暂无更新内容");
    }
}

async function initLoadAllCache() {
    const cacheCount = loadArticleCacheFromStorage();
    if(cacheCount > 0){
        renderHomeFromCache();
    }
    if(feedList.length === 0) return;
    if(cacheCount === 0){
        try{
            await refreshAllRSSWithLock();
            renderHomeFromCache();
        }catch(e){
            console.warn("初始化加载失败",e);
        }
    }else{
        checkAndPromptUpdate(false);
    }
}

function renderHomeFromCache() {
    if(scrollObserver) scrollObserver.disconnect();
    renderPageNum = 0;
    renderedArticleCount = 0;
    loadLock = false;
    if(localCacheArticles.length === 0) {
        articleBox.innerHTML = `<div class="empty-tip">暂无文章内容</div>`;
        return;
    }
    let filterArticles = getVisibleHomeArticles(localCacheArticles);
    if(filterSourceUrl) {
        filterArticles = localCacheArticles.filter(item => item.sourceUrl.trim() === filterSourceUrl.trim());
    }

    currentArticles = [...filterArticles];
    renderPageNum = 1;
    renderPagedList(true);
    bindScrollLoadMore();
}

async function renderSingleFeedFromSource(sourceUrl){
    if(scrollObserver) scrollObserver.disconnect();
    const feed = feedList.find(f => String(f.url).trim() === String(sourceUrl).trim());
    const fallbackList = localCacheArticles.filter(item => item.sourceUrl.trim() === String(sourceUrl).trim());
    articleBox.innerHTML = `<div class="empty-tip">正在加载该订阅内容...</div>`;
    try{
        const xmlText = await fetchRSSFeed(sourceUrl);
        const list = parseRSS(xmlText, feed ? feed.name : "未命名订阅", sourceUrl, feed ? feed.category : "img")
            .sort((a,b)=>new Date(b.date).getTime() - new Date(a.date).getTime());
        if(list.length === 0){
            currentArticles = fallbackList;
            articleBox.innerHTML = fallbackList.length ? "" : `<div class="empty-tip">该订阅暂未解析到内容</div>`;
        }else{
            currentArticles = list;
            const merged = [...list, ...localCacheArticles.filter(item => item.sourceUrl.trim() !== String(sourceUrl).trim())]
                .sort((a,b)=>new Date(b.date).getTime() - new Date(a.date).getTime())
                .slice(0, ARTICLE_CACHE_LIMIT);
            localCacheArticles = merged;
            allArticles = [...merged];
            saveArticleCacheToStorage(merged);
        }
    }catch(err){
        console.warn("单订阅加载失败：", err);
        currentArticles = fallbackList;
        articleBox.innerHTML = fallbackList.length ? "" : `<div class="empty-tip">该订阅加载失败，且本地没有缓存内容</div>`;
    }
    if(currentArticles.length > 0){
        renderPageNum = 1;
        renderedArticleCount = 0;
        loadLock = false;
        renderPagedList(true);
        bindScrollLoadMore();
    }
}

window.mergeNewData = async function(){
    if(scrollObserver) scrollObserver.disconnect();
    allArticles = await loadAllRSS();
    localCacheArticles = [...allArticles];
    saveArticleCacheToStorage(allArticles);
    let filterArticles = allArticles;
    if(filterSourceUrl) filterArticles = allArticles.filter(item => item.sourceUrl === filterSourceUrl);
    currentArticles = [...filterArticles];
    renderPageNum = 1;
    renderedArticleCount = 0;
    renderPagedList(true);
}

function renderPagedList(reset = false){
    if(reset){
        articleBox.innerHTML = "";
        renderedArticleCount = 0;
    }else{
        const oldTip = articleBox.querySelector("#loadMoreDom,.bottom-tip");
        if(oldTip) oldTip.remove();
    }
    const nextCount = Math.min(renderPageNum * PAGE_SIZE, currentArticles.length);
    const appendList = currentArticles.slice(renderedArticleCount, nextCount);
    if(appendList.length > 0){
        articleBox.insertAdjacentHTML("beforeend", renderCardList(appendList));
        renderedArticleCount = nextCount;
    }
    const remain = currentArticles.length - renderedArticleCount;
    articleBox.insertAdjacentHTML("beforeend", remain > 0
        ? `<div class="load-more-tip" id="loadMoreDom">滚动加载更多...</div>`
        : `<div class="bottom-tip">全部内容加载完毕</div>`);
    bindAllCardEvent();
    bindVideoPauseObserver();
    initHlsVideo();
}

function bindScrollLoadMore(){
    if(scrollObserver) scrollObserver.disconnect();
    const loadDom = document.getElementById("loadMoreDom");
    if(!loadDom) return;
    scrollObserver = new IntersectionObserver(async (entries)=>{
        const entry = entries[0];
        if(entry.isIntersecting && !loadLock){
            loadLock = true;
            renderPageNum += 1;
            renderPagedList();
            setTimeout(()=>bindScrollLoadMore(), 30);
            loadLock = false;
        }
    }, {rootMargin: "150px 0px"});
    scrollObserver.observe(loadDom);
}

function renderCardList(list){
    let html = "";
    list.forEach(item => html += buildCard(item, false));
    return html;
}

function getPureText(str){
    if(!str) return "无标题";
    let div = document.createElement("div");
    div.innerHTML = str;
    let text = div.textContent || div.innerText;
    text = text.replace(/<[^>]+>/g, "").trim();
    return text || "无标题";
}

function sanitizeIframeHtml(iframeHtml) {
    const box = document.createElement("template");
    box.innerHTML = iframeHtml || "";
    const iframe = box.content.querySelector("iframe");
    if (!iframe) return "";
    const src = iframe.getAttribute("src") || "";
    if (!isHttpUrl(src)) return "";
    return `<iframe src="${escapeAttr(src)}" width="100%" height="260px" frameborder="0" allowfullscreen loading="lazy" referrerpolicy="no-referrer"></iframe>`;
}

function formatCardDate(dateStr){
    if(!dateStr || dateStr === "未知时间") return "未知时间";
    const date = new Date(dateStr);
    if(Number.isNaN(date.getTime())) return escapeHtml(dateStr);
    const year = date.getFullYear();
    const month = date.getMonth() + 1;
    const day = date.getDate();
    const hour = String(date.getHours()).padStart(2, "0");
    const minute = String(date.getMinutes()).padStart(2, "0");
    const second = String(date.getSeconds()).padStart(2, "0");
    return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
}

function buildCard(item, isFav = false){
    let mediaHtml = "";

            if (item.isM3u8Video === true) {
    // M3U8视频，保留原有标记，仅给HLS调用
    const imgs = [...new Set(item.media.imgs || [])];
    const posterImg = imgs.length > 0 ? imgs[0] : "";
    const posterProxy = posterImg ? getProxyUrl(posterImg, isFav) : "";
    const posterDirect = posterImg ? cleanMediaUrl(posterImg) : "";
    let posterAttr = posterProxy ? `poster="${escapeAttr(posterProxy)}"` : "";
    const posterDirectAttr = posterDirect ? `data-poster-direct="${escapeAttr(posterDirect)}"` : "";
    const videoDirect = cleanMediaUrl(item.videoUrl);
    const videoProxy = getForceMediaProxyUrl(item.videoUrl, isFav);
    const preferProxy = hostMatched(item.videoUrl);
    const firstSrc = preferProxy ? videoProxy : videoDirect;
    const altSrc = preferProxy ? videoDirect : videoProxy;
    const proxyVideoAttr = preferProxy ? 'data-proxy-video="1"' : "";

    mediaHtml = `<div class="video-single-wrap">
        <video class="media-video" data-m3u8="1" ${proxyVideoAttr} preload="none" playsinline ${posterAttr} ${posterDirectAttr} data-src="${escapeAttr(firstSrc)}" data-alt-src="${escapeAttr(altSrc)}">
</video>${mediaControlsHtml()}</div>`;
}else if(item.videoUrl){
    // MP4视频：单独class media-video-mp4，完全脱离HLS逻辑
    const imgs = [...new Set(item.media.imgs || [])];
    const posterImg = imgs.length > 0 ? imgs[0] : "";
    const posterProxy = posterImg ? getProxyUrl(posterImg, isFav) : "";
    const posterDirect = posterImg ? cleanMediaUrl(posterImg) : "";
    let posterAttr = posterProxy ? `poster="${escapeAttr(posterProxy)}"` : "";
    const posterDirectAttr = posterDirect ? `data-poster-direct="${escapeAttr(posterDirect)}"` : "";
    const videoProxy = getProxyUrl(item.videoUrl, isFav);
    const proxyVideoAttr = hostMatched(item.videoUrl) ? 'data-proxy-video="1"' : "";
    
    mediaHtml = `<div class="video-single-wrap">
        <video ${hostMatched(item.videoUrl) ? 'crossorigin="anonymous"' : ""} class="media-video-mp4" ${proxyVideoAttr} preload="none" playsinline ${posterAttr} ${posterDirectAttr} src="${escapeAttr(videoProxy)}">
</video>${mediaControlsHtml()}</div>`;
}else if(item.iframe){
    let iframeStr = sanitizeIframeHtml(item.iframe);

    if (iframeStr) {
        mediaHtml = `<div class="video-single-wrap" style="background:#000;overflow:hidden;border-radius:10px;">
        ${iframeStr}
    </div>`;
    }
}else{
    const imgs = [...new Set(item.media.imgs || [])];

                <img class="grid-img" ${hostMatched(src) ? 'crossorigin="anonymous"' : ""} data-imggroup='${escapeAttr(JSON.stringify(imgs))}' data-direct-src="${escapeAttr(imgDirect)}" src="${escapeAttr(imgProxy)}" loading="lazy" onerror="if(this.dataset.directSrc && this.src!==this.dataset.directSrc){this.src=this.dataset.directSrc;}">${overlay}
            </div>`;
        })
        mediaHtml += `</div></div>`;
    }
}

    const titleRaw = escapeHtml(getPureText(item.title));

}

function renderFav(){
    if(scrollObserver) scrollObserver.disconnect();
    renderPageNum = 1;
    loadLock = false;
    if(favList.length === 0) {
        favPanel.innerHTML = `<div class="empty-tip" style="min-height:70vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">暂无收藏内容<br>浏览主页卡片点击收藏按钮添加</div>`;
        return;
    }
    const sortedFavList = [...favList].sort((a,b)=>new Date(b.date).getTime() - new Date(a.date).getTime());
    const slice = sortedFavList.slice(0, PAGE_SIZE);
    let html = "";
    slice.forEach(item => html += buildCard(item, true));
    const remain = sortedFavList.length - slice.length;
    if(remain > 0){
        html += `<div class="load-more-tip" id="favLoadMore">滚动加载更多...</div>`;
    }else{
        html += `<div class="bottom-tip">全部收藏加载完毕</div>`;
    }
    favPanel.innerHTML = html;
    bindAllCardEvent();
    bindVideoPauseObserver();
    initHlsVideo();
    const favLoad = document.getElementById("favLoadMore");
    if(favLoad){
        const favObserver = new IntersectionObserver(async (e)=>{
            if(e[0].isIntersecting && !loadLock){
                loadLock = true;
                renderPageNum += 1;
                const favSlice = sortedFavList.slice(0, renderPageNum * PAGE_SIZE);
                let favHtml = "";
                favSlice.forEach(i=>favHtml += buildCard(i,true));
                const rem = sortedFavList.length - favSlice.length;
                if(rem>0) favHtml += `<div class="load-more-tip" id="favLoadMore">滚动加载更多...</div>`;
                else favHtml += `<div class="bottom-tip">全部收藏加载完毕</div>`;
                favPanel.innerHTML = favHtml;
                bindAllCardEvent();
                bindVideoPauseObserver();
                initHlsVideo();
                favObserver.disconnect();
                setTimeout(()=>{
                    const newFavLoad = document.getElementById("favLoadMore");
                    if(newFavLoad) favObserver.observe(newFavLoad);
                },30);
                loadLock = false;
            }
        },{rootMargin:"150px 0"});
        favObserver.observe(favLoad);
    }
}

function bindAllCardEvent(){
    document.querySelectorAll(".grid-img").forEach((img)=>{
        img.onclick = function(){
            const imgs = JSON.parse(this.dataset.imggroup);
            currentPreviewImgs = imgs;
            const box = this.closest(".grid-img-box");
            const allBoxes = box.parentElement.querySelectorAll(".grid-img-box");
            const clickIndex = Array.from(allBoxes).indexOf(box);
            renderPreviewSlider(imgs, clickIndex);
            imgPreviewMask.style.display = "flex";
        }
    })

    document.querySelectorAll(".card-title-wrap").forEach(wrap=>{
        const titleEl = wrap.querySelector(".card-title");
        const toggleBtn = wrap.querySelector(".title-toggle-btn");
        setTimeout(()=>{
            const lineHeight = parseFloat(getComputedStyle(titleEl).lineHeight) || 22;
            const needToggle = titleEl.scrollHeight > lineHeight * 2 + 2;
            if(needToggle){
                toggleBtn.style.display = "block";
                toggleBtn.innerText = "展开";
            }else{
                toggleBtn.style.display = "none";
            }
        }, 80);
        toggleBtn.onclick = function(){
            if(titleEl.classList.contains("expand")){
                titleEl.classList.remove("expand");
                this.innerText = "展开";
            }else{
                titleEl.classList.add("expand");
                this.innerText = "收起";
            }
        }
    })

    document.querySelectorAll(".btn-share").forEach(btn=>{
        btn.onclick = async function(e){
            e.stopPropagation();
            const cardDom = this.closest(".tweet-card");
            const link = cardDom.dataset.link;
            try{
                await navigator.clipboard.writeText(link);
                showToast("链接已复制");
            }catch(err){
                const input = document.createElement("input");
                input.value = link;
                document.body.appendChild(input);
                input.select();
                document.execCommand("copy");
                input.remove();
                showToast("链接已复制");
            }
        }
    })
    document.querySelectorAll(".btn-fav").forEach(btn=>{
        btn.onclick = function(e){
            e.stopPropagation();
            const link = this.dataset.link;
            const target = allArticles.find(i=>i.link === link);
            if(target && !favList.some(f=>f.link === link)){
                favList.push(target);
                localStorage.setItem(FAV_KEY, JSON.stringify(favList));
                this.innerHTML = favIconSvg(true);
                this.setAttribute("aria-label", "已收藏");
                this.setAttribute("title", "已收藏");
                this.classList.add("collected");
                showToast("已添加到收藏");
            }
        }
    })
    document.querySelectorAll(".del-fav").forEach(btn=>{
        btn.onclick = function(e){
            e.stopPropagation();
            const link = this.dataset.link;
            favList = favList.filter(f=>f.link !== link);
            localStorage.setItem(FAV_KEY, JSON.stringify(favList));
            this.closest(".tweet-card").remove();
            showToast("已取消收藏");
        }
    })

    if (!readObserver) {
        readObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) {
                    const card = entry.target;
                    if(lastPageTitle !== "RSS媒体阅读器" || !articleBox.contains(card)) return;
                    if(card.getBoundingClientRect().bottom > 90) return;
                    const link = card.dataset.link;
                    if(!link) return;
                    markCardRead(card);
                }
            });
        }, { rootMargin: "-90% 0px 0px 0px" });
    }
    document.querySelectorAll(".tweet-card").forEach(card => {
        readObserver.observe(card);
    });
}

async function loadAllRSS(){
    const queue = [...feedList];
    const allGroups = [];
    async function worker(){
        while(queue.length){
            const f = queue.shift();
            try{
                let xmlText = await fetchRSSFeed(f.url);
                if(!xmlText) {
                    allGroups.push([]);
                }else{
                    allGroups.push(parseRSS(xmlText, f.name, f.url, f.category));
                }
            }catch(e){
                console.warn(`订阅【${f.name}】拉取失败：`, e.message);
                allGroups.push([]);
            }
        }
    }
    const workerCount = Math.min(RSS_CONCURRENCY, queue.length);
    await Promise.all(Array.from({length: workerCount}, worker));
    let res = [];
    allGroups.forEach(group=>res = res.concat(group));
    res.sort((a,b)=> new Date(b.date).getTime() - new Date(a.date).getTime());
    return res;
}

function parseRSS(xml, sourceName, sourceUrl, cat){
    let list = [];
    const itemReg = /<(item|entry)>([\s\S]*?)<\/(item|entry)>/gi;
    let m;
    while((m = itemReg.exec(xml)) !== null){
        let txt = m[2];
        let titleRaw = (txt.match(/<title>([\s\S]*?)<\/title>/) || [])[1] || "无标题";
        titleRaw = fullDecodeXml(titleRaw);

        let link = "";
        const linkHref = txt.match(/<link[^>]*href="([^"]+)"/);
        if(linkHref) link = linkHref[1];
        if(!link) link = (txt.match(/<link>([\s\S]*?)<\/link>/) || [])[1] || "";
        if(!link) link = (txt.match(/<guid>([\s\S]*?)<\/guid>/) || [])[1] || "#";
        link = fullDecodeXml(link);

        let date = (txt.match(/<pubDate>([\s\S]*?)<\/pubDate>/) || [])[1] || "";
        if(!date) date = (txt.match(/<updated>([\s\S]*?)<\/updated>/) || [])[1] || "未知时间";
        date = fullDecodeXml(date);

        let desc = (txt.match(/<description>([\s\S]*?)<\/description>/) || [])[1] || "";
        if(!desc) desc = (txt.match(/<summary>([\s\S]*?)<\/summary>/) || [])[1] || "";
        desc = fullDecodeXml(desc);

        let iframeCode = "";
        const iframeMatch = desc.match(/<iframe[\s\S]*?<\/iframe>/i);
        if(iframeMatch){
            iframeCode = iframeMatch[0];
            iframeCode = iframeCode.replace(/""/g, '"');
        }

        let mp4List = [];
        let m3u8List = [];
        const fullText = txt + desc;
        const addMp4 = url => {
            const cleaned = cleanMediaUrl(url);
            if(cleaned) mp4List.push(cleaned);
        };
        const addM3u8 = url => {
            const cleaned = cleanMediaUrl(url);
            if(cleaned) m3u8List.push(cleaned);
        };
        const addImg = (arr, url) => {
            const cleaned = cleanMediaUrl(url);
            if(cleaned) arr.push(cleaned);
        };

        const playerUrlReg = /url=(https?:\/\/[^&"<>]+\.m3u8(?:\?[^&"<>]*)?)/gi;
        let regMatch;
        while ((regMatch = playerUrlReg.exec(fullText)) !== null) {
            addM3u8(regMatch[1]);
        }
        const m3u8AttrReg = /(?:src|data-src|href)=["']([^"']+\.m3u8(?:\?[^"']*)?)["']/gi;
        while((regMatch = m3u8AttrReg.exec(fullText)) !== null){
            addM3u8(regMatch[1]);
        }
        const m3u8RawReg = /https?:\/\/[^<>"'\s]+\.m3u8(?:\?[^<>"'\s]*)?/gi;
        while((regMatch = m3u8RawReg.exec(fullText)) !== null){
            addM3u8(regMatch[0]);
        }
        getUrlCandidates(fullText, ".m3u8").forEach(addM3u8);

        const videoAttrReg = /(?:src|data-src|href)=["']([^"']+\.mp4(?:\?[^"']*)?)["']/gi;
        while((regMatch = videoAttrReg.exec(fullText)) !== null){
            addMp4(regMatch[1]);
        }
        const videoRawReg = /https?:\/\/[^<>"'\s]+\.mp4(?:\?[^<>"'\s]*)?/gi;
        while((regMatch = videoRawReg.exec(fullText)) !== null){
            addMp4(regMatch[0]);
        }
        getUrlCandidates(fullText, ".mp4").forEach(addMp4);

        mp4List = [...new Set(mp4List)];
        m3u8List = [...new Set(m3u8List)];

        let finalVideoUrl = "";
        let isM3u8Video = false;

        if(m3u8List.length > 0){
            finalVideoUrl = m3u8List[0];
            isM3u8Video = true;
            iframeCode = "";
        }else if(mp4List.length > 0){
            finalVideoUrl = mp4List[0];
            isM3u8Video = false;
        }

        const imgAttrReg = /(?:src|data-src|href)=["']([^"']+\.(jpg|jpeg|png|gif|webp)(?:\?[^"']*)?)["']/gi;
        let imgsRaw = [];
        let imgMatch;
        while((imgMatch = imgAttrReg.exec(txt + desc)) !== null){
            addImg(imgsRaw, imgMatch[1]);
        }
        const imgRawReg = /https?:\/\/[^<>"'\s]+\.(jpg|jpeg|png|gif|webp)(?:\?[^<>"'\s]*)?/gi;
        while((imgMatch = imgRawReg.exec(txt + desc)) !== null){
            addImg(imgsRaw, imgMatch[0]);
        }
        const imgs = [...new Set(imgsRaw)];

        list.push({
            title: titleRaw,
            link: link,
            date: date,
            media:{
                imgs: imgs,
                videos: []
            },
            videoUrl: finalVideoUrl,
            iframe: iframeCode,
            sourceName,
            sourceUrl,
            isM3u8Video: isM3u8Video
        });
    }
    return list;
}

function escapeReg(str){
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function renderSearchResult(keyword){
    searchResultBox.innerHTML = "";
    if(!keyword.trim()) return;
    const kw = keyword.trim();
    const list = localCacheArticles.filter(item=>{
        const titleRaw = getPureText(item.title);
        return titleRaw.includes(kw) && !hasBlockedKeyword(titleRaw);
    }).sort((a,b)=>new Date(b.date)-new Date(a.date));

    if(list.length===0){
        searchResultBox.innerHTML = `<div class="empty-tip">没有匹配结果</div>`;
        return;
    }

    let html = "";
    list.forEach(item=>{
        let titleRaw = getPureText(item.title);
        const reg = new RegExp(`(${escapeReg(kw)})`,"g");
        titleRaw = titleRaw.replace(reg,`<mark style="background:#34c759;color:#fff;padding:0 2px;">$1</mark>`);

        let cardHtml = buildCard(item,false);
        cardHtml = cardHtml.replace(/<div class="card-title">[\s\S]*?<\/div>/,`<div class="card-title">${titleRaw}</div>`);
        html += cardHtml;
    });
    searchResultBox.innerHTML = html;
    bindAllCardEvent();
    bindVideoPauseObserver();
    initHlsVideo();
}

    const input = document.getElementById("blockKeywordInput");
    const kw = input.value.trim();

        showToast("请输入关键字");
        return;
    }
    if(blockKeywordList.some(k => k.toLowerCase() === kw.toLowerCase())){
        showToast("该关键字已存在");

    }

document.getElementById("keywordList").addEventListener("click", function(e){
    const t = e.target;
    const idx = Number(t.dataset.idx);
    if(!Number.isFinite(idx) || idx < 0) return;
    
    if(t.classList.contains("kw-del")){
        const kw = blockKeywordList[idx];
        blockKeywordList.splice(idx, 1);
        saveBlockKeywords();
        renderKeywordList();
        showToast(`已删除屏蔽：${kw}`);
    }
    if(t.classList.contains("kw-edit")){
        const oldKw = blockKeywordList[idx];
        const newKw = prompt("修改屏蔽关键字：", oldKw);
        if(newKw === null) return;
        const trimmed = newKw.trim();
        if(!trimmed){
            showToast("关键字不能为空");
            return;
        }
        if(blockKeywordList.some((k, i) => i !== idx && k.toLowerCase() === trimmed.toLowerCase())){
            showToast("该关键字已存在");
            return;
        }
        blockKeywordList[idx] = trimmed;
        saveBlockKeywords();
        renderKeywordList();
        showToast("关键字修改成功");
    }
});
