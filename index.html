<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FollowMe阅读器 beta 4.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto;}
html,body {
  height: 100%;
  overflow: hidden;
  background:#f5f5f5;
  scrollbar-width: none;
}
html::-webkit-scrollbar,
body::-webkit-scrollbar,
*::-webkit-scrollbar {
  display: none !important;
  width: 0 !important;
  height: 0 !important;
}
body{
  display:flex;
  flex-direction:column;
  color:#111;
}
#mainHeader{
    width:100%;
    height:50px;
    background:#fff;
    border-bottom:1px solid #eee;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-shrink:0;
}
#pageTitle{font-size:18px;font-weight:600;}
.beta-tag{
    background:#28a745;
    color:#fff;
    font-size:12px;
    padding:3px 8px;
    border-radius:12px;
}
.bottom-nav{
    width:100%;
    height:60px;
    background:#fff;
    border-top:1px solid #eee;
    display:flex;
    flex-shrink:0;
}
.bottom-nav button{
    flex:1;
    border:none;
    font-size:15px;
    background:transparent;
    color:#333;
}
.bottom-nav button.active{
    color:#28a745;
}
.main-wrap{
    flex:1;
    padding:10px 8px;
    overflow-y: auto;
}
.page-home,.page-manage,.page-add,.page-fav{display:none;}
#articleBox,#favPanel{
    width: 100%;
    position: relative;
}
.tweet-card{
    width: calc(50% - 6px);
    position: absolute;
    background:#fff;
    border:1px solid #cce0f5;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}
.tweet-card.col-right{
    left: calc(50% + 6px);
}
.card-media{
    width:100%;
    border-radius:0;
    overflow:hidden;
    position:relative;
}
.card-media img{
    width:100%;
    height:auto;
    object-fit:contain;
    display:block;
}
.card-media video{
    width:100%;
    height:auto;
    object-fit:contain;
    display:block;
}
.img-count-badge{
    position:absolute;
    top:8px;
    right:8px;
    background:#28a745;
    color:#fff;
    font-size:14px;
    padding:2px 6px;
    border-radius:6px;
}
.card-info-row{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 12px;
}
.source-tag{
    font-size:12px;
    padding:3px 6px;
    border-radius:6px;
    color:#fff;
    flex-shrink:0;
}
.time-simple{
    font-size:11px;
    color:#666;
    text-align:center;
    flex:1;
}
.fav-star-btn{
    border:none;
    background:transparent;
    font-size:18px;
    flex-shrink:0;
}
.fav-star-btn.collected{
    color:#ff9500;
}
.empty-tip{
    padding:100px 10px;
    color:#777;
    font-size:16px;
    text-align:center;
}
.video-single-wrap{
    width:100%;
    position:relative;
    background:#000;
}
.media-video{
    width:100%;
    display:block;
}
.video-custom-ctrl{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    padding:8px 12px;
    background:linear-gradient(transparent, rgba(0,0,0,0.7));
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:#ffffff;
}
.video-ctrl-btn{
    background:transparent;
    border:none;
    color:#ffffff !important;
    font-size:20px;
    cursor:pointer;
}
.update-bar{
    width:calc(100% - 16px);
    margin: 0 8px 10px;
    border-radius:10px;
    padding:12px;
    background:#e6f7ff;
    border:1px solid #91caff;
    color:#0050b3;
    text-align:center;
    cursor:pointer;
    font-size:15px;
}
.no-update-bar{
    background:#f0f2f5 !important;
    border-color:#dcdcdc !important;
    color:#666 !important;
    cursor:default !important;
}
.media-popup-mask{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display:none;
    z-index:9999;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
    padding:20px;
}
.popup-media{
    max-width:95vw;
    max-height:75vh;
}
.popup-title{
    color:#fff;
    font-size:16px;
    text-align:center;
}
.popup-close-btn{
    position:absolute;
    bottom:24px;
    right:24px;
    color:#fff;
    font-size:28px;
    background:transparent;
    border:none;
}
.img-preview-mask{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    z-index:9999;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.preview-wrap{
    width:100%;
    height:calc(100% - 60px);
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    scrollbar-width:none;
}
.preview-wrap::-webkit-scrollbar{display:none;}
.preview-slide{
    flex:0 0 100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}
.preview-img{
    max-width:92vw;
    max-height:92vh;
    object-fit:contain;
}
.preview-close{
    position:absolute;
    bottom:24px;
    right:24px;
    color:#fff;
    font-size:28px;
    border:none;
    background:transparent;
    z-index:10;
}
.preview-tip{
    color:#fff;
    font-size:16px;
    text-align:center;
    height:40px;
}
.feed-top-op{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:12px;
}
#importFeed{background:#ff7823;color:#fff;border:none;padding:6px 14px;border-radius:999px;font-size:14px;}
#exportAllBtn{background:#b388eb;color:#fff;border:none;padding:6px 14px;border-radius:999px;font-size:14px;}
#delAllFeed{background:#c0392b;color:#fff;border:none;padding:6px 14px;border-radius:999px;font-size:14px;}
.feed-list{border:1px solid #eee;border-radius:10px;background:#fff;}
.feed-item{
    padding:12px;
    border-bottom:1px solid #eee;
    display:flex;
    align-items:center;
    justify-content:space-between;
}
.feed-left{
    display:flex;
    align-items:center;
    gap:10px;
}
.feed-index{
    width:26px;
    text-align:center;
    font-size:14px;
    color:#666;
}
.feed-name-btn{
    padding:4px 10px;
    border-radius:8px;
    color:#fff;
    font-size:14px;
    width:auto;
    white-space:nowrap;
}
.feed-name-btn.type-img{
    background:#cccccc !important;
}
.feed-name-btn.type-video{
    background:#666666 !important;
}
.feed-btn-group{
    display:flex;
    gap:6px;
}
.feed-btn-group button{
    border:none;
    padding:4px 10px;
    border-radius:8px;
    font-size:12px;
    color:#fff;
}
.feed-btn-group .view-feed{background:#1d9bf0;}
.feed-btn-group .edit{background:#ff9500;}
.feed-btn-group .del{background:#e53e3e;}
.add-feed-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:8px;
    align-items:center;
}
.add-feed-row input,.add-feed-row select{
    flex:1;
    min-width:140px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}
#confirmAdd{background:#1d9bf0;color:#fff;border:none;padding:0 16px;border-radius:8px;font-size:15px;}
.modal-mask{
    position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;
    align-items:center;justify-content:center;z-index:9999;padding:12px;
}
.modal-box{
    width:100%;
    max-width:480px;
    background:#fff;
    padding:16px;
    border-radius:12px;
}
.modal-box input,.modal-box select{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}
.modal-btn-bar{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    margin-top:12px;
}
#cancelEdit{
    border:none;
    padding:8px 18px;
    border-radius:999px;
    font-size:15px;
    background:#6c757d;
    color:#fff;
}
#saveEdit{
    border:none;
    padding:8px 18px;
    border-radius:999px;
    font-size:15px;
    background:#28a745;
    color:#fff;
}
</style>
</head>
<body>
<header id="mainHeader">
    <h1 id="pageTitle">FollowMe阅读器</h1>
    <span class="beta-tag">beta 4.0</span>
</header>
<div class="main-wrap">
    <div class="page-home" id="pageHome">
        <div class="update-bar" id="updateBar" style="display:none;"></div>
        <div id="articleBox"></div>
    </div>
    <div class="page-manage" id="pageManage">
        <div class="feed-top-op">
            <button id="importFeed">一键导入</button>
            <button id="exportAllBtn">一键导出</button>
            <button id="delAllFeed">清空订阅</button>
            <input type="file" id="importFileInput" accept=".json" style="position:absolute;opacity:0;width:1px;height:1px;">
        </div>
        <div class="feed-list" id="feedPanel"></div>
    </div>
    <div class="page-add" id="pageAdd">
        <div class="add-feed-row">
            <input id="feedName" placeholder="自定义订阅名称（可选）">
            <select id="feedCat">
                <option value="img">图片类RSS</option>
                <option value="video">视频类RSS</option>
            </select>
            <input id="feedUrl" placeholder="粘贴RSS订阅地址">
            <button id="confirmAdd">添加订阅</button>
        </div>
    </div>
    <div class="page-fav" id="pageFav">
        <div id="favPanel"></div>
    </div>
</div>
<div class="bottom-nav">
    <button class="active" id="btnHome">主页</button>
    <button id="btnManage">管理订阅</button>
    <button id="btnAdd">添加订阅</button>
    <button id="btnFav">我的收藏</button>
</div>

<div class="media-popup-mask" id="videoPopupMask">
    <button class="popup-close-btn">×</button>
    <video class="popup-media" id="popupVideo" controls></video>
    <div class="popup-title" id="popupVideoTitle"></div>
</div>

<div class="img-preview-mask" id="imgPreviewMask">
    <button class="preview-close">×</button>
    <div class="preview-wrap" id="previewWrap"></div>
    <div class="preview-tip" id="previewTip"></div>
</div>

<script>
const PROXY_DOMAINS = ["video.twimg.com", "pbs.twimg.com", "video.3go.fun"];
const origin = window.location.origin;
function getProxyUrl(rawUrl, isFav = false) {
    if (typeof rawUrl !== "string") return rawUrl;
    for (const d of PROXY_DOMAINS) {
        if (rawUrl.includes(d)) {
            let url = `${origin}/media-proxy?url=${encodeURIComponent(rawUrl)}`;
            if (isFav) url += "&cache=long";
            return url;
        }
    }
    return rawUrl;
}

const FEED_KEY = "local_rss_feeds";
const FAV_KEY = "rss_fav_list";
const TIMEOUT = 10000;

let feedList = JSON.parse(localStorage.getItem(FEED_KEY)) || [];
let favList = JSON.parse(localStorage.getItem(FAV_KEY)) || [];
let allArticles = [];
let cacheArticles = [];
let lastItemCount = 0;
let lastScrollY = 0;
let filterUrl = "";

const pageHome = document.getElementById("pageHome");
const pageManage = document.getElementById("pageManage");
const pageAdd = document.getElementById("pageAdd");
const pageFav = document.getElementById("pageFav");
const articleBox = document.getElementById("articleBox");
const feedPanel = document.getElementById("feedPanel");
const favPanel = document.getElementById("favPanel");
const updateBar = document.getElementById("updateBar");
const btnHome = document.getElementById("btnHome");
const btnManage = document.getElementById("btnManage");
const btnAdd = document.getElementById("btnAdd");
const btnFav = document.getElementById("btnFav");
const allBtns = [btnHome, btnManage, btnAdd, btnFav];
const editModal = document.querySelector(".modal-mask");

const videoPopupMask = document.getElementById("videoPopupMask");
const popupVideo = document.getElementById("popupVideo");
const popupVideoTitle = document.getElementById("popupVideoTitle");
document.querySelector(".popup-close-btn").onclick = ()=>{
    videoPopupMask.style.display = "none";
    popupVideo.pause();
};

document.querySelector(".preview-close").onclick = ()=>{
    document.getElementById("imgPreviewMask").style.display = "none";
};

function renderHomeFromCache() {
    articleBox.innerHTML = "";
    if(cacheArticles.length === 0) {
        articleBox.innerHTML = `<div class="empty-tip">暂无文章内容，请添加订阅源加载内容</div>`;
        return;
    }
    let list = [...cacheArticles];
    if(filterUrl) list = list.filter(item=>item.sourceUrl === filterUrl);

    let html = "";
    list.forEach((item, index)=>{
        let card = buildCard(item, false);
        if(index % 2 === 1){
            card = card.replace(`class="tweet-card"`, `class="tweet-card col-right"`);
        }
        html += card;
    });
    articleBox.innerHTML = html;

    setTimeout(()=>{
        const cards = articleBox.querySelectorAll(".tweet-card");
        let leftH = 0;
        let rightH = 0;
        const gap = 6;
        cards.forEach((card, idx)=>{
            if(idx % 2 === 0){
                card.style.top = leftH + "px";
                leftH += card.offsetHeight + gap;
            }else{
                card.style.top = rightH + "px";
                rightH += card.offsetHeight + gap;
            }
        });
        articleBox.style.height = Math.max(leftH, rightH) + "px";
        document.querySelector(".main-wrap").scrollTop = lastScrollY;
    },30);

    bindCardEvent();
}

function renderFavPage(){
    favPanel.innerHTML = "";
    if(favList.length === 0){
        favPanel.innerHTML = `<div class="empty-tip">暂无收藏</div>`;
        return;
    }
    let html = "";
    favList.forEach((item, index)=>{
        let card = buildCard(item, true);
        if(index % 2 === 1){
            card = card.replace(`class="tweet-card"`, `class="tweet-card col-right"`);
        }
        html += card;
    });
    favPanel.innerHTML = html;

    setTimeout(()=>{
        const cards = favPanel.querySelectorAll(".tweet-card");
        let leftH = 0;
        let rightH = 0;
        const gap = 6;
        cards.forEach((card, idx)=>{
            if(idx % 2 === 0){
                card.style.top = leftH + "px";
                leftH += card.offsetHeight + gap;
            }else{
                card.style.top = rightH + "px";
                rightH += card.offsetHeight + gap;
            }
        });
        favPanel.style.height = Math.max(leftH, rightH) + "px";
    },30);
    bindCardEvent();
}

function buildCard(item, isFav){
    let media = "";
    const imgs = [...new Set(item.media.imgs || [])];
    const videos = item.media.videos || [];
    const titleText = item.title || "无标题";

    if(videos.length > 0){
        let poster = imgs.length ? getProxyUrl(imgs[0], isFav) : "";
        let videoSrc = getProxyUrl(videos[0], isFav);
        media = `
        <div class="card-media video-single-wrap">
            <video class="media-video" preload="none" playsinline src="${videoSrc}" ${poster?`poster="${poster}"`:""}></video>
            <div class="video-custom-ctrl">
                <button class="video-ctrl-btn play-btn">▶</button>
                <span class="video-time-text">00:00</span>
                <button class="video-ctrl-btn popup-video-btn" data-title="${titleText}">⤢</button>
            </div>
        </div>`;
    }else if(imgs.length>0){
        let firstImg = getProxyUrl(imgs[0], isFav);
        let total = imgs.length;
        media = `
        <div class="card-media">
            <img class="preview-img" data-all-img='${JSON.stringify(imgs)}' data-title="${titleText}" src="${firstImg}">
            ${total>1 ? `<span class="img-count-badge">${total}</span>` : ""}
        </div>`;
    }

    const starActive = favList.some(x=>x.link === item.link);
    let starIcon = starActive ? "★" : "☆";
    let starClass = starActive ? "fav-star-btn collected" : "fav-star-btn";

    return `
<div class="tweet-card" data-link="${item.link}">
    ${media}
    <div class="card-info-row">
        <span class="source-tag" style="background:${getRandomColor(item.sourceName)}">${item.sourceName}</span>
        <span class="time-simple">${formatTime(item.date)}</span>
        <button class="${starClass}" data-link="${item.link}">${starIcon}</button>
    </div>
</div>`;
}

function getRandomColor(name){
    const map = {};
    if(map[name]) return map[name];
    const colors = ["#1d9bf0","#ff7823","#28a745","#e53e3e","#9333ea"];
    map[name] = colors[name.charCodeAt(0)%colors.length];
    return map[name];
}

function formatTime(str){
    if(!str) return "";
    const d = new Date(str);
    if(isNaN(d.getTime())) return str;
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${m}/${day}`;
}

function bindCardEvent(){
    document.querySelectorAll(".preview-img").forEach(img=>{
        img.onclick = function(){
            const title = this.dataset.title;
            const images = JSON.parse(this.dataset.allImg);
            const wrap = document.getElementById("previewWrap");
            wrap.innerHTML = "";
            images.forEach(src=>{
                let slide = document.createElement("div");
                slide.className = "preview-slide";
                slide.innerHTML = `<img class="preview-img" src="${getProxyUrl(src)}">`;
                wrap.appendChild(slide);
            });
            document.getElementById("previewTip").innerText = title;
            document.getElementById("imgPreviewMask").style.display = "flex";
        }
    });

    // 修复：弹窗读取卡片标题，不再读取时间
    document.querySelectorAll(".popup-video-btn").forEach(btn=>{
        const videoDom = btn.closest(".video-single-wrap").querySelector(".media-video");
        btn.dataset.src = videoDom.src;
        btn.onclick = function(e){
            e.stopPropagation();
            popupVideo.src = this.dataset.src;
            popupVideoTitle.innerText = this.dataset.title;
            videoPopupMask.style.display = "flex";
            popupVideo.play();
        }
    });

    document.querySelectorAll(".media-video").forEach(vid=>{
        vid.ontimeupdate = function(){
            let remain = this.duration - this.currentTime;
            if(!isNaN(remain)){
                let m = Math.floor(remain/60).toString().padStart(2,"0");
                let s = Math.floor(remain%60).toString().padStart(2,"0");
                this.parentElement.querySelector(".video-time-text").innerText = `${m}:${s}`;
            }
        }
    });

    document.querySelectorAll(".play-btn").forEach(btn=>{
        btn.onclick = function(){
            const vid = this.closest(".video-single-wrap").querySelector(".media-video");
            if(vid.paused){
                vid.play();
                this.innerText = "⏸";
            }else{
                vid.pause();
                this.innerText = "▶";
            }
        }
    });

    // 修复收藏按钮点击失效
    document.querySelectorAll(".fav-star-btn").forEach(btn=>{
        btn.onclick = function(){
            const link = this.dataset.link;
            const targetItem = allArticles.find(art=>art.link === link);
            if(!targetItem) return;
            let index = favList.findIndex(art=>art.link === link);
            if(index > -1){
                favList.splice(index,1);
                this.innerText = "☆";
                this.classList.remove("collected");
            }else{
                favList.push(targetItem);
                this.innerText = "★";
                this.classList.add("collected");
            }
            localStorage.setItem(FAV_KEY, JSON.stringify(favList));
        }
    })
}

async function checkNewUpdate(){
    renderHomeFromCache();
    let newList = [];
    for(let feed of feedList){
        try{
            let xml = await fetchRSS(feed.url);
            let items = parseRSS(xml, feed.name, feed.url, feed.category);
            newList = newList.concat(items);
        }catch(e){}
    }
    newList.sort((a,b)=>new Date(b.date) - new Date(a.date));
    const newNum = newList.length;
    const diff = newNum - lastItemCount;

    if(diff > 0){
        updateBar.style.display = "block";
        updateBar.className = "update-bar";
        updateBar.innerText = `有${diff}条内容更新，点击本条提示刷新`;
        updateBar.onclick = ()=>{
            cacheArticles = newList;
            lastItemCount = newNum;
            updateBar.style.display = "none";
            renderHomeFromCache();
        }
    }else{
        updateBar.style.display = "block";
        updateBar.classList.add("no-update-bar");
        updateBar.innerText = "暂无条目更新";
        updateBar.onclick = null;
        setTimeout(()=>{
            updateBar.style.display = "none";
        },2000);
    }
}

function switchPage(targetPage, title){
    if(pageHome.style.display === "block"){
        lastScrollY = document.querySelector(".main-wrap").scrollTop;
    }
    pageHome.style.display = "none";
    pageManage.style.display = "none";
    pageAdd.style.display = "none";
    pageFav.style.display = "none";
    targetPage.style.display = "block";
    document.getElementById("pageTitle").innerText = title;
    allBtns.forEach(b=>b.classList.remove("active"));
    if(targetPage === pageHome) btnHome.classList.add("active");
    if(targetPage === pageManage) btnManage.classList.add("active");
    if(targetPage === pageAdd) btnAdd.classList.add("active");
    if(targetPage === pageFav) btnFav.classList.add("active");

    if(targetPage === pageHome) checkNewUpdate();
    if(targetPage === pageManage) renderFeedList();
    if(targetPage === pageFav) renderFavPage();
}

btnHome.onclick = ()=>{filterUrl="";switchPage(pageHome,"FollowMe阅读器");};
btnManage.onclick = ()=>switchPage(pageManage,"管理订阅");
btnAdd.onclick = ()=>switchPage(pageAdd,"添加订阅");
btnFav.onclick = ()=>switchPage(pageFav,"我的收藏");

async function loadAllRSS(){
    let list = [];
    for(let feed of feedList){
        try{
            let xmlText = await fetchRSS(feed.url);
            let items = parseRSS(xmlText, feed.name, feed.url, feed.category);
            list = list.concat(items);
        }catch(err){}
    }
    list.sort((a,b)=>new Date(b.date)-new Date(a.date));
    allArticles = list;
    cacheArticles = [...list];
    lastItemCount = list.length;
}

async function fetchRSS(url){
    const res = await fetch(url, {signal: AbortSignal.timeout(TIMEOUT)});
    if(!res.ok) throw new Error("请求失败");
    return await res.text();
}

function parseRSS(xmlStr, sourceName, sourceUrl, cat){
    let list = [];
    const reg = /<(item|entry)>([\s\S]*?)<\/(item|entry)>/gi;
    let match;
    while((match = reg.exec(xmlStr)) !== null){
        const content = match[2];
        const title = (content.match(/<title>([\s\S]*?)<\/title>/)||[])[1] || "无标题";
        const link = (content.match(/<link>([^<]+)<\/link>/)||[])[1] || "#";
        const pubDate = (content.match(/<pubDate>([^<]+)<\/pubDate>|<updated>([^<]+)<\/updated>/)||[])[1] || "";
        const desc = content.match(/<description>([\s\S]*?)<\/description>|<summary>([\s\S]*?)<\/summary>/)?.[1] || "";

        let imgs = [];
        let imgReg = /https?:\/\/[^ ]+\.(jpg|jpeg|png|gif|webp)/gi;
        let imgMatch;
        while((imgMatch = imgReg.exec(desc))!=null){
            imgs.push(imgMatch[0]);
        }
        let videos = [];
        let vidReg = /https?:\/\/[^ ]+\.(mp4|m3u8)/gi;
        let vidMatch;
        while((vidMatch = vidReg.exec(desc))!=null){
            videos.push(vidMatch[0]);
        }

        list.push({
            title,
            link,
            date: pubDate,
            sourceName,
            sourceUrl,
            media:{imgs,videos}
        })
    }
    return list;
}

// 修复：管理订阅编辑按钮失效，改用事件委托精准捕获
function renderFeedList(){
    feedPanel.innerHTML = "";
    feedList.forEach((feed, idx)=>{
        let cls = feed.category === "video" ? "type-video" : "type-img";
        let html = `
<div class="feed-item" data-index="${idx}">
    <div class="feed-left">
        <div class="feed-index">${idx+1}</div>
        <div class="feed-name-btn ${cls}">${feed.name}</div>
    </div>
    <div class="feed-btn-group">
        <button class="view-feed">查看</button>
        <button class="edit">编辑</button>
        <button class="del">删除</button>
    </div>
</div>`;
        feedPanel.innerHTML += html;
    });
}

// 全局委托订阅列表点击事件，修复按钮无响应
feedPanel.onclick = function(e){
    const item = e.target.closest(".feed-item");
    if(!item) return;
    const idx = Number(item.dataset.index);
    if(e.target.classList.contains("del")){
        feedList.splice(idx,1);
        localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
        renderFeedList();
    }
    if(e.target.classList.contains("edit")){
        const f = feedList[idx];
        document.getElementById("feedName").value = f.name;
        document.getElementById("feedCat").value = f.category;
        document.getElementById("feedUrl").value = f.url;
        editModal.style.display = "flex";
    }
    if(e.target.classList.contains("view-feed")){
        filterUrl = feedList[idx].url;
        switchPage(pageHome,"FollowMe阅读器");
    }
}

document.getElementById("saveEdit").onclick = function(){
    feedList[feedList.findIndex(f=>f.url === document.getElementById("feedUrl").value)].name = document.getElementById("feedName").value;
    feedList[feedList.findIndex(f=>f.url === document.getElementById("feedUrl").value)].category = document.getElementById("feedCat").value;
    feedList[feedList.findIndex(f=>f.url === document.getElementById("feedUrl").value)].url = document.getElementById("feedUrl").value;
    localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
    editModal.style.display = "none";
    renderFeedList();
};
document.getElementById("cancelEdit").onclick = ()=> editModal.style.display = "none";

document.getElementById("confirmAdd").onclick = async function(){
    const name = document.getElementById("feedName").value.trim() || "未命名订阅";
    const cat = document.getElementById("feedCat").value;
    const url = document.getElementById("feedUrl").value.trim();
    if(!url) return alert("请填写RSS地址");
    feedList.push({name, category:cat, url});
    localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
    await loadAllRSS();
    switchPage(pageHome,"FollowMe阅读器");
};

document.getElementById("exportAllBtn").onclick = function(){
    const blob = new Blob([JSON.stringify(feedList,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "rss订阅备份.json";
    a.click();
};
document.getElementById("importFileInput").onchange = function(e){
    const reader = new FileReader();
    reader.onload = ev=>{
        try{
            let arr = JSON.parse(ev.target.result);
            feedList = [...feedList,...arr];
            localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
            renderFeedList();
        }catch(err){alert("文件格式错误");}
    };
    reader.readAsText(e.target.files[0]);
};
document.getElementById("delAllFeed").onclick = function(){
    if(confirm("清空全部订阅？")){
        feedList = [];
        localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
        renderFeedList();
    }
};

window.onload = async function(){
    await loadAllRSS();
    switchPage(pageHome,"FollowMe阅读器");
}
