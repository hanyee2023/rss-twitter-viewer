<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>本地RSS媒体阅读器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto;}
html {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
body{background:#f5f5f5;color:#111;min-height:100vh;}
#mainHeader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:66px;
    background:#fff;
    border-bottom:1px solid #eee;
    z-index:999;
    padding:5px 10px;
}
#pageTitle{font-size:22px;margin-bottom:6px;font-weight:600;}
.top-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.top-bar button{
    border:none;
    padding:8px 14px;
    border-radius:999px;
    font-size:16px;
    background:#1d9bf0;
    color:#fff;
    white-space:nowrap;
}
.top-bar button.active{background:#28a745;}
.main-wrap{
    margin-top:70px;
    padding:12px 10px;
    min-height:calc(100vh - 70px);
}
.page-home,.page-manage,.page-add,.page-fav{display:none;}
.feed-top-op{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:14px;
}
#importFeed{background:#ff7823;color:#fff;border:none;padding:8px 16px;border-radius:999px;font-size:15px;}
#exportAllBtn{background:#b388eb;color:#fff;border:none;padding:8px 16px;border-radius:999px;font-size:15px;}
#delAllFeed{background:#c0392b;color:#fff;border:none;padding:8px 16px;border-radius:999px;font-size:15px;}
.feed-list{border:1px solid #eee;border-radius:10px;background:#fff;}
.feed-item{
    padding:12px;
    border-bottom:1px solid #eee;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}
.feed-item.type-img{background:#d4edda22;}
.feed-item.type-video{background:#ffe6e622;}
.feed-item:last-child{border-bottom:none;}
.feed-btn-group button{
    border:none;
    padding:6px 10px;
    border-radius:999px;
    font-size:13px;
    color:#fff;
    margin:0 3px;
}
.feed-btn-group .view-feed{background:#1d9bf0;}
.feed-btn-group .edit{background:#ff9500;}
.feed-btn-group .del{background:#e53e3e;}
.add-feed-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;}
.add-feed-row input,.add-feed-row select{
    flex:1;
    min-width:160px;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}
#confirmAdd{background:#1d9bf0;color:#fff;border:none;padding:0 20px;border-radius:8px;font-size:16px;}
.empty-tip{text-align:center;padding:120px 10px;color:#777;font-size:18px;}
.error-tip{text-align:center;padding:40px 10px;color:#c0392b;font-size:16px;margin-bottom:12px;}
.update-tip-bar{
    background:#e6f7ff;
    border:1px solid #91caff;
    border-radius:12px;
    padding:14px;
    text-align:center;
    color:#0050b3;
    margin-bottom:12px;
    cursor:pointer;
    font-size:16px;
}
.no-update-tip{
    background:#f0f2f5;
    border:1px solid #dcdcdc;
    border-radius:12px;
    padding:14px;
    text-align:center;
    color:#666;
    margin-bottom:12px;
    font-size:16px;
}
.load-more-tip{
    text-align:center;padding:18px 0;color:#888;font-size:14px;
}
.tweet-card{
    background:#fff;
    border:1px solid #cce0f5;
    border-radius:16px;
    padding:16px;
    margin-bottom:12px;
}
.card-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}
.card-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#45B7D1;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:18px;
    flex-shrink:0;
}
.source-name-text{
    font-size:18px;
    font-weight:600;
    color:#111;
}
/* 修复：卡片标题链接去除下划线 */
.card-title{
    font-size:16px;
    font-weight:normal;
    color:#000;
    display:-webkit-box;
    -webkit-line-clamp:2;
    overflow:hidden;
    line-height:1.5;
    text-decoration:none;
}
.img-grid-wrap{border-radius:12px;overflow:hidden;background:#f0f0f0;margin:8px 0;}
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.grid-img-box{aspect-ratio:1/1;}
.grid-img{width:100%;height:100%;object-fit:cover;display:block;}
.video-single-wrap{width:100%;border-radius:12px;overflow:hidden;background:#000;margin:8px 0;}
.media-video{width:100%;display:block;}
.bottom-tip{text-align:center;padding:22px 0;color:#999;font-size:13px;}
.modal-mask{
    position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;
    align-items:center;justify-content:center;z-index:9999;padding:15px;
}
.modal-box{width:100%;max-width:520px;background:#fff;padding:20px;border-radius:12px;}
.modal-box input,.modal-box select{width:100%;margin-bottom:12px;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;}
/* 美化弹窗按钮，匹配全局风格 */
.modal-btn-bar{display:flex;gap:12px;justify-content:flex-end;margin-top:14px;}
#cancelEdit{
    border:none;
    padding:10px 22px;
    border-radius:999px;
    font-size:16px;
    background:#6c757d;
    color:#fff;
}
#saveEdit{
    border:none;
    padding:10px 22px;
    border-radius:999px;
    font-size:16px;
    background:#28a745;
    color:#fff;
}
.img-preview-mask{
    position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;
    align-items:center;justify-content:center;z-index:9999;
}
.preview-close{position:absolute;top:24px;right:24px;color:#fff;font-size:32px;border:none;background:transparent;cursor:pointer;}
.preview-img{max-width:95vw;max-height:95vh;object-fit:contain;}
.tip-toast{
    position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.65);color:#fff;padding:10px 20px;border-radius:22px;display:none;font-size:15px;
}
/* 手机屏幕适配 */
@media (max-width:768px){
  .top-bar button{padding:10px 16px;font-size:17px;}
  .tweet-card{padding:16px;}
  #pageTitle{font-size:20px;}
  .modal-btn-bar{justify-content:center;}
  #cancelEdit,#saveEdit{flex:1;text-align:center;}
}
</style>
</head>
<body>
<header id="mainHeader">
    <h1 id="pageTitle">本地RSS媒体阅读器</h1>
    <div class="top-bar">
        <button id="btnHome">主页</button>
        <button id="btnManage">管理订阅源</button>
        <button id="btnAdd">添加订阅</button>
        <button id="btnFav">我的收藏</button>
    </div>
</header>
<div class="main-wrap">
    <div class="page-home" id="pageHome">
        <div id="articleBox"></div>
    </div>
    <div class="page-manage" id="pageManage">
        <div class="feed-top-op">
            <button id="importFeed">一键导入</button>
            <button id="exportAllBtn">导出备份</button>
            <button id="delAllFeed">清空全部订阅</button>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">
        </div>
        <div class="feed-list" id="feedPanel"></div>
    </div>
    <div class="page-add" id="pageAdd">
        <div class="add-feed-row">
            <input id="feedName" placeholder="自定义订阅名称（可选）">
            <select id="feedCat">
                <option value="img">图片类RSS</option>
                <option value="video">视频类RSS</option>
            </select>
            <input id="feedUrl" placeholder="粘贴标准RSS订阅链接">
            <button id="confirmAdd">确认添加</button>
        </div>
    </div>
    <div class="page-fav" id="pageFav"><div id="favPanel"></div></div>
</div>
<div class="modal-mask" id="editModal">
    <div class="modal-box">
        <h3>编辑订阅源</h3>
        <input id="editIndex" type="hidden">
        <input id="editName" placeholder="自定义订阅名称">
        <select id="editCat">
            <option value="img">图片类RSS</option>
            <option value="video">视频类RSS</option>
        </select>
        <input id="editUrl" placeholder="RSS订阅链接">
        <div class="modal-btn-bar">
            <button id="cancelEdit">取消</button>
            <button id="saveEdit">保存修改</button>
        </div>
    </div>
</div>
<div class="img-preview-mask" id="imgPreviewMask">
    <div style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
        <button class="preview-close" id="previewClose">×</button>
        <img class="preview-img" id="previewImg" alt="">
        <div class="tip-toast" id="slideTip"></div>
    </div>
</div>
<script>
const FEED_KEY = "local_rss_feeds";
const FAV_KEY = "rss_fav_list";
const PAGE_SIZE = 50;
const FETCH_TIMEOUT = 4000; // 4秒超时，适配手机弱网
let feedList = JSON.parse(localStorage.getItem(FEED_KEY)) || [];
let favList = JSON.parse(localStorage.getItem(FAV_KEY)) || [];
let currentArticles = [];
let renderPageNum = 0;
let allArticles = [];
let scrollObserver = null;

// ====================== 多代理池配置（6个备用公共CORS代理，自动轮换） ======================
const PROXY_POOL = [
    "https://api.codetabs.com/v1/proxy?quest=",
    "https://staging.corsproxy.io/?",
    "https://cors-proxy.htmldriven.com/?url=",
    "https://proxy.cors.sh/",
    "https://api.cors.lol/?url=",
    "https://whateverorigin.org/get?url="
];
// 自动切换代理请求函数：遍历全部代理直到成功，全部失败返回空数组
async function fetchWithAutoProxy(targetUrl) {
    const encodedUrl = encodeURIComponent(targetUrl);
    for (const proxyPrefix of PROXY_POOL) {
        const fullUrl = proxyPrefix + encodedUrl;
        try {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
            const res = await fetch(fullUrl, { signal: controller.signal });
            clearTimeout(timer);
            if (res.ok) {
                const text = await res.text();
                // whateverorigin特殊格式处理
                if (proxyPrefix.includes("whateverorigin")) {
                    const json = JSON.parse(text);
                    return json.contents || "";
                }
                return text;
            }
        } catch (err) {
            console.log(`代理 ${proxyPrefix} 请求失败，自动切换下一个`);
            continue;
        }
    }
    // 所有代理全部失效
    return "";
}
// ======================================================================================

const pageHome = document.getElementById("pageHome");
const pageManage = document.getElementById("pageManage");
const pageAdd = document.getElementById("pageAdd");
const pageFav = document.getElementById("pageFav");
const articleBox = document.getElementById("articleBox");
const feedPanel = document.getElementById("feedPanel");
const favPanel = document.getElementById("favPanel");
const btnHome = document.getElementById("btnHome");
const btnManage = document.getElementById("btnManage");
const btnAdd = document.getElementById("btnAdd");
const btnFav = document.getElementById("btnFav");
const pageTitle = document.getElementById("pageTitle");
const allBtns = [btnHome, btnManage, btnAdd, btnFav];
const editModal = document.getElementById("editModal");

function showPage(pageEl, title) {
    pageHome.style.display = "none";
    pageManage.style.display = "none";
    pageAdd.style.display = "none";
    pageFav.style.display = "none";
    feedPanel.innerHTML = "";
    favPanel.innerHTML = "";
    pageEl.style.display = "block";
    pageTitle.textContent = title;
    allBtns.forEach(b => b.classList.remove("active"));
    if (title === "本地RSS媒体阅读器") btnHome.classList.add("active");
    if (title === "管理订阅源") btnManage.classList.add("active");
    if (title === "添加订阅") btnAdd.classList.add("active");
    if (title === "我的收藏") btnFav.classList.add("active");
    if (title === "本地RSS媒体阅读器") handleHomeClick();
    if (title === "管理订阅源") renderManage();
    if (title === "我的收藏") renderFav();
}

btnHome.onclick = () => showPage(pageHome, "本地RSS媒体阅读器");
btnManage.onclick = () => showPage(pageManage, "管理订阅源");
btnAdd.onclick = () => showPage(pageAdd, "添加订阅");
btnFav.onclick = () => showPage(pageFav, "我的收藏");

async function handleHomeClick(){
    if(scrollObserver) scrollObserver.disconnect();
    renderPageNum = 0;
    articleBox.innerHTML = `<div class="empty-tip">正在加载订阅内容，请稍候...</div>`;
    if(feedList.length === 0){
        articleBox.innerHTML = `<div class="empty-tip">暂无订阅，请切换至【添加订阅】新增RSS链接</div>`;
        return;
    }
    try{
        allArticles = await loadAllRSS();
    }catch(err){
        articleBox.innerHTML = `<div class="error-tip">所有代理均请求失败，请稍后重试或更换RSS源</div>`;
        return;
    }
    if(allArticles.length === 0){
        articleBox.innerHTML = `<div class="empty-tip">所有订阅暂未获取到文章内容，可更换RSS链接重试</div>`;
        return;
    }
    if(currentArticles.length === 0){
        currentArticles = [...allArticles];
        renderPageNum = 1;
        renderPagedList();
        bindScrollLoadMore();
        return;
    }
    // 复用已缓存数据对比更新，不再重复请求
    const newItems = allArticles.filter(item => !currentArticles.some(c => c.link === item.link));
    const tempBox = articleBox.innerHTML;
    try{
        if(newItems.length > 0){
            let html = `<div class="update-tip-bar" onclick="mergeNewData()">检测到${newItems.length}条新内容，点击刷新</div>`;
            html += renderPartialCardList(currentArticles, renderPageNum * PAGE_SIZE);
            html += renderPageNum * PAGE_SIZE < currentArticles.length ? `<div class="load-more-tip">滚动加载更多...</div>` : `<div class="bottom-tip">全部内容加载完毕</div>`;
            articleBox.innerHTML = html;
        }else{
            let html = `<div class="no-update-tip">暂无更新内容</div>`;
            html += renderPartialCardList(currentArticles, renderPageNum * PAGE_SIZE);
            html += renderPageNum * PAGE_SIZE < currentArticles.length ? `<div class="load-more-tip">滚动加载更多...</div>` : `<div class="bottom-tip">全部内容加载完毕</div>`;
            articleBox.innerHTML = html;
        }
    }catch(err){
        articleBox.innerHTML = tempBox;
    }
    bindScrollLoadMore();
}

window.mergeNewData = async function(){
    if(scrollObserver) scrollObserver.disconnect();
    currentArticles = [...allArticles];
    renderPageNum = 1;
    renderPagedList();
    bindScrollLoadMore();
}

function renderPagedList(){
    const slice = currentArticles.slice(0, PAGE_SIZE);
    let html = renderCardList(slice);
    html += currentArticles.length > PAGE_SIZE ? `<div class="load-more-tip">滚动加载更多...</div>` : `<div class="bottom-tip">全部内容加载完毕</div>`;
    articleBox.innerHTML = html;
    bindImageClick();
}

function renderPartialCardList(list, limit){
    const slice = list.slice(0, limit);
    return renderCardList(slice);
}

function renderCardList(list){
    let html = "";
    list.forEach(item => html += buildCard(item));
    return html;
}

function bindScrollLoadMore(){
    if(scrollObserver) scrollObserver.disconnect();
    const loadTip = articleBox.querySelector(".load-more-tip");
    if(!loadTip) return;
    scrollObserver = new IntersectionObserver((entries)=>{
        if(entries[0].isIntersecting){
            scrollObserver.disconnect();
            renderPageNum += 1;
            const end = renderPageNum * PAGE_SIZE;
            const newSlice = currentArticles.slice(0, end);
            let html = "";
            const tipBar = articleBox.querySelector(".update-tip-bar, .no-update-tip");
            if(tipBar) html += tipBar.outerHTML;
            html += renderCardList(newSlice);
            html += end < currentArticles.length ? `<div class="load-more-tip">滚动加载更多...</div>` : `<div class="bottom-tip">全部内容加载完毕</div>`;
            articleBox.innerHTML = html;
            bindImageClick();
            bindScrollLoadMore();
        }
    }, {rootMargin:"200px 0px"});
    scrollObserver.observe(loadTip);
}

function renderManage(){
    if(feedList.length === 0){
        feedPanel.innerHTML = `<div class="empty-tip">暂无订阅源</div>`;
        return;
    }
    let html = "";
    feedList.forEach((f, idx)=>{
        html += `
        <div class="feed-item ${f.category==="video"?"type-video":"type-img"}" data-idx="${idx}">
            <div class="feed-info">
                <div class="feed-name">${f.name||"未命名订阅"}</div>
                <div style="font-size:12px;color:#777;">${f.category==="img"?"图片类":"视频类"}</div>
            </div>
            <div class="feed-btn-group">
                <button class="view-feed" data-url="${f.url}" data-name="${f.name}">主页查看</button>
                <button class="edit" data-idx="${idx}">编辑</button>
                <button class="del" data-idx="${idx}">删除</button>
            </div>
        </div>`;
    })
    feedPanel.innerHTML = html;
    feedPanel.onclick = function(e){
        const t = e.target;
        const idx = Number(t.dataset.idx);
        if(t.classList.contains("del")){
            feedList.splice(idx,1);
            localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
            renderManage();
        }
        if(t.classList.contains("view-feed")){
            showPage(pageHome, "本地RSS媒体阅读器");
        }
        if(t.classList.contains("edit")){
            const f = feedList[idx];
            document.getElementById("editIndex").value = idx;
            document.getElementById("editName").value = f.name||"";
            document.getElementById("editCat").value = f.category||"img";
            document.getElementById("editUrl").value = f.url;
            editModal.style.display = "flex";
        }
    }
}

function renderFav(){
    if(favList.length === 0){
        favPanel.innerHTML = `<div class="empty-tip">暂无收藏内容，前往主页收藏文章</div>`;
        return;
    }
    let html = "";
    favList.forEach(item => html += buildCard(item, true));
    html += `<div class="bottom-tip">无更多收藏</div>`;
    favPanel.innerHTML = html;
    bindImageClick();
}

function buildCard(item, isFav = false){
    let mediaHtml = "";
    if(item.media.videos && item.media.videos.length > 0){
        mediaHtml = `<div class="video-single-wrap"><video class="media-video" controls src="${item.media.videos[0]}"></video></div>`;
    }else if(item.media.imgs && item.media.imgs.length > 0){
        const uniqueImgs = [...new Set(item.media.imgs)];
        const showImgs = uniqueImgs.slice(0,4);
        mediaHtml = `<div class="img-grid-wrap"><div class="img-grid">`;
        showImgs.forEach(src=>{
            mediaHtml += `<div class="grid-img-box"><img class="grid-img" data-imggroup='${JSON.stringify(uniqueImgs)}' src="${src}"></div>`;
        })
        mediaHtml += `</div></div>`;
    }
    if(isFav){
        return `
        <div class="tweet-card" data-link="${item.link}">
            <div class="card-top">
                <div class="card-avatar">${item.sourceName.slice(0,1)}</div>
                <div class="source-name-text">${item.sourceName}</div>
            </div>
            <div class="card-middle">
                <a class="card-title" target="_blank" href="${item.link}">${item.title}</a>
                ${mediaHtml}
            </div>
            <div class="card-bottom" style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
                <span style="font-size:12px;color:#666;">${item.date}</span>
                <button class="del-fav" data-link="${item.link}" style="border:none;background:transparent;color:#666;font-size:13px;">取消收藏</button>
            </div>
        </div>`;
    }else{
        const isCollected = favList.some(f=>f.link === item.link);
        const favTxt = isCollected ? "已收藏" : "收藏";
        const favColor = isCollected ? "#ff9500" : "#666";
        return `
        <div class="tweet-card" data-link="${item.link}">
            <div class="card-top">
                <div class="card-avatar">${item.sourceName.slice(0,1)}</div>
                <div class="source-name-text">${item.sourceName}</div>
            </div>
            <div class="card-middle">
                <a class="card-title" target="_blank" href="${item.link}">${item.title}</a>
                ${mediaHtml}
            </div>
            <div class="card-bottom" style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
                <span style="font-size:12px;color:#666;">${item.date}</span>
                <button class="fav-btn" data-link="${item.link}" style="border:none;background:transparent;color:${favColor};font-size:13px;">${favTxt}</button>
            </div>
        </div>`;
    }
}

function bindImageClick(){
    document.querySelectorAll(".grid-img").forEach(img=>{
        img.onclick = function(){
            document.getElementById("previewImg").src = this.src;
            document.getElementById("imgPreviewMask").style.display = "flex";
        }
    })
    // 取消收藏：静默更新本地数组，不刷新页面
    document.querySelectorAll(".del-fav").forEach(btn=>{
        btn.onclick = function(){
            const link = this.dataset.link;
            favList = favList.filter(f=>f.link !== link);
            localStorage.setItem(FAV_KEY, JSON.stringify(favList));
            // 仅移除当前卡片DOM，无全局刷新
            this.closest(".tweet-card").remove();
        }
    })
    // 收藏按钮：静默更新本地数组，不刷新页面
    document.querySelectorAll(".fav-btn").forEach(btn=>{
        btn.onclick = function(){
            const link = this.dataset.link;
            const target = allArticles.find(i=>i.link === link);
            if(target && !favList.some(f=>f.link === link)){
                favList.push(target);
                localStorage.setItem(FAV_KEY, JSON.stringify(favList));
                // 仅修改按钮文字颜色，无页面刷新
                this.innerText = "已收藏";
                this.style.color = "#ff9500";
            }
        }
    })
}

// 批量加载所有RSS，自动切换代理
async function loadAllRSS(){
    const taskList = feedList.map(async f=>{
        try{
            const xmlText = await fetchWithAutoProxy(f.url);
            if(!xmlText) return [];
            return parseRSS(xmlText, f.name, f.url, f.category);
        }catch(e){
            console.warn(`订阅【${f.name}】请求全部代理失败`);
            return [];
        }
    })
    const allGroups = await Promise.all(taskList);
    let res = [];
    allGroups.forEach(group=>res = res.concat(group));
    // 按发布时间倒序排序
    res.sort((a,b)=> new Date(b.date).getTime() - new Date(a.date).getTime());
    return res;
}

// 兼容标准RSS / Atom 双格式解析函数
function parseRSS(xml, sourceName, sourceUrl, cat){
    let list = [];
    const itemReg = /<(item|entry)>([\s\S]*?)<\/(item|entry)>/gi;
    let m;
    while((m = itemReg.exec(xml)) !== null){
        let txt = m[2];
        // 标题兼容
        let title = (txt.match(/<title>([\s\S]*?)<\/title>/) || [])[1] || "无标题";
        // 链接兼容两种写法
        let link = "";
        const linkHref = txt.match(/<link[^>]*href="([^"]+)"/);
        if(linkHref) link = linkHref[1];
        if(!link) link = (txt.match(/<guid>([\s\S]*?)<\/guid>/) || [])[1] || "#";
        // 日期兼容 pubDate / updated
        let date = (txt.match(/<pubDate>([\s\S]*?)<\/pubDate>/) || [])[1] || "";
        if(!date) date = (txt.match(/<updated>([\s\S]*?)<\/updated>/) || [])[1] || "未知时间";
        // 正文兼容 description / summary
        let desc = (txt.match(/<description>([\s\S]*?)<\/description>/) || [])[1] || "";
        if(!desc) desc = (txt.match(/<summary>([\s\S]*?)<\/summary>/) || [])[1] || "";

        // 提取MP4视频链接
        let videos = [];
        const videoReg = /https?:\/\/[^\s"']+\.mp4/gi;
        let vMatch;
        while((vMatch = videoReg.exec(txt + desc)) !== null){
            videos.push(vMatch[0]);
        }
        // 提取图片 jpg/png/webp/gif
        let imgsRaw = [];
        const imgReg = /https?:\/\/[^\s"']+\.(jpg|jpeg|png|gif|webp)/gi;
        let imgMatch;
        while((imgMatch = imgReg.exec(txt + desc)) !== null){
            imgsRaw.push(imgMatch[0]);
        }
        const imgs = [...new Set(imgsRaw)];
        list.push({
            title: decodeXml(title),
            link: decodeXml(link),
            date: decodeXml(date),
            media:{imgs:imgs,videos:videos},
            sourceName,
            sourceUrl
        })
    }
    return list;
}
// XML特殊字符转义还原
function decodeXml(s){
    return s.replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&amp;/g,"&").replace(/&quot;/g,"\"");
}

// 添加订阅按钮逻辑
document.getElementById("confirmAdd").onclick = function(){
    const name = document.getElementById("feedName").value.trim();
    const cat = document.getElementById("feedCat").value;
    const url = document.getElementById("feedUrl").value.trim();
    if(!url){alert("请输入RSS订阅链接");return;}
    if(feedList.some(f=>f.url === url)){alert("该订阅已存在");return;}
    feedList.push({name,category:cat,url});
    localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
    document.getElementById("feedName").value = "";
    document.getElementById("feedUrl").value = "";
    alert("添加成功，点击主页加载内容");
}
// 编辑订阅保存
document.getElementById("saveEdit").onclick = function(){
    const idx = Number(document.getElementById("editIndex").value);
    const name = document.getElementById("editName").value.trim();
    const cat = document.getElementById("editCat").value;
    const url = document.getElementById("editUrl").value.trim();
    const oldUrl = feedList[idx].url;
    if(feedList.some((f,i)=>i!==idx && f.url === url)){
        alert("该RSS链接已存在");return;
    }
    feedList[idx].name = name;
    feedList[idx].category = cat;
    feedList[idx].url = url;
    localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
    // 同步更新收藏内旧链接
    favList.forEach(item=>{
        if(item.sourceUrl === oldUrl) item.sourceUrl = url;
    })
    localStorage.setItem(FAV_KEY, JSON.stringify(favList));
    editModal.style.display = "none";
    renderManage();
}
document.getElementById("cancelEdit").onclick = ()=>editModal.style.display = "none";

// 导入导出备份
document.getElementById("importFeed").onclick = ()=>document.getElementById("importFileInput").click();
document.getElementById("importFileInput").onchange = function(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev=>{
        try{
            const data = JSON.parse(ev.target.result);
            let addNum = 0;
            data.forEach(item=>{
                if(item.url && !feedList.some(f=>f.url === item.url)){
                    feedList.push(item);
                    addNum++;
                }
            })
            localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
            renderManage();
            alert(`成功导入${addNum}条订阅，切换主页加载内容`);
        }catch(err){alert("备份文件格式错误");}
    }
    reader.readAsText(file);
}
document.getElementById("exportAllBtn").onclick = function(){
    const jsonStr = JSON.stringify(feedList,null,2);
    const blob = new Blob([jsonStr],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "rss订阅备份.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
}
document.getElementById("delAllFeed").onclick = function(){
    if(confirm("确定清空全部订阅？收藏不会同步删除")){
        feedList = [];
        localStorage.setItem(FEED_KEY, JSON.stringify(feedList));
        renderManage();
    }
}
